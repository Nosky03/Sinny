<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Scrivere Uguale - Sinny UI Unificata</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background-color: white; 
    margin: 0; padding: 0; width: 100%; height: 100dvh; 
    overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    position: fixed; overscroll-behavior: none;
  }

  /* Area Canvas e Sfondo */
  #drawingCanvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 5; touch-action: none;
  }
  #lineBackground {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1; pointer-events: none;
  }
  .bg-line { width: 100%; height: 1px; background-color: #e5e5ea; position: absolute; }
  .bg-grid-v { height: 100%; width: 1px; background-color: #e5e5ea; position: absolute; }

  /* UI Pulsanti base */
  .top-bar { 
    position: absolute; top: 20px; left: 20px; 
    display: flex; align-items: center; gap: 12px; z-index: 1000; 
    width: calc(100% - 40px); /* Allargato leggermente per bilanciare la pillola */
  }
  
  .btn-ui {
    width: 46px; height: 46px; background-color: #f2f2f7;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    border: none; /* Reset bordi */
  }

  .spacer { flex-grow: 1; }

.btn-pill-container {
  height: 46px;
  background-color: #f2f2f7;
  border-radius: 23px;
  display: flex;
  align-items: center;
  padding: 0 3px;
  gap: 14px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);

  /* AUMENTA QUESTO VALORE PER SPOSTARE A SINISTRA */
  margin-right: 286px; 

  /* Gestione altezza (negativo sale, positivo scende) */
  transform: translateY(2px); 
}


  .btn-pill-container .btn-ui-inline {
    width: 44px;
    height: 100%;
    background-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* Stile specifico per il cerchio bianco dei tre puntini (non usato nella pillola, rimosso) */

  .close-screen { position: absolute; top: 6px; right: -14px; z-index: 1000; cursor: pointer; }

  /* Menu Modale */
  .center-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.15); display: none;
    justify-content: center; align-items: center; z-index: 2000;
  }
  .center-menu {
    width: 85%; max-width: 420px; background-color: #f2f2f7; 
    border-radius: 32px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .box {
    width: 100%; height: 100px; border-radius: 16px; border: 3px solid transparent; 
    background-color: white; cursor: pointer; display: flex; flex-direction: column; 
    justify-content: center; padding: 10px; gap: 4px; overflow: hidden;
  }
  .box.selected { border-color: #ff9f0a; }

  /* Grafiche rettangoli menu */
  .mini-line { width: 100%; height: 1px; background: #d1d1d6; }
  .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; height: 100%; width: 100%; }
  .mini-cell { border: 0.5px solid #d1d1d6; aspect-ratio: 1; }

/* Il Menu a tendina allineato al centro della pillola */
.dropdown-menu {
  position: absolute;
  top: 0;           
  
  /* Posiziona l'inizio del menu a metà della pillola */
  left: 50%;        
  
  /* Sposta il menu a sinistra del 50% della sua larghezza per centrarlo */
  transform: translateX(-50%); 
  
  width: 374px;     
  background-color: #f2f2f7;
  border-radius: 23px; 
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  display: none;    
  flex-direction: column;
  padding: 134px 0;
  z-index: 1001;
}

.dropdown-item {
  padding: 12px 20px;
  font-size: 14px;
  color: black;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.dropdown-item:active { background-color: #e5e5ea; }


/* Posizionamento sezioni nel menu */
.menu-content-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 30px; /* Spazio tra Nota e AirDrop */
}

.note-section {
  display: flex;
  align-items: center;
  gap: 15px;
 
}

.note-box {
  width: 60px;
  height: 60px;
  background-color: white;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  font-size: 24px;
  font-weight: bold;
  color: #ff9f0a; /* Arancione stile Note iOS */
}

.note-label {
  font-size: 12px;
  color: #000;
  font-weight: 500;

}

/* Modifica AirDrop per stare sotto */
.airdrop-section {
  display: flex;
  flex-direction: column;
  align-items: flex-start; /* Allineato a sinistra sotto la nota */
  gap: 8px;
  margin-left: 0px;
}


.airdrop-icon {
  width: 60px;
  height: 60px;
  background-color: white;
  border-radius: 14px; /* Angoli arrotondati stile iOS */
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.airdrop-text {
  font-size: 12px;
  color: #000;
  font-weight: 500;
}

  .center-pill {
    position: absolute;
    right: calc(10% - 94px); /* Calcolato per stare allineato a destra */
    height: 46px;
    width: 246px; /* Larghezza base */
    background-color: #ffffff;
    border-radius: 23px;
    display: flex;
    align-items: center;
    padding: 0 12px 0 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    z-index: 1000;
    font-size: 14px;
    font-weight: 500;
  }

  /* QUESTA È LA PARTE NUOVA PER IL TESTO */
  .center-pill span {
    font-size: 17px;       /* Testo leggermente più grande */
    color: #636366;        /* Colore grigio */
    font-weight: 500;      /* Peso normale per non farlo sembrare troppo grassetto */
    pointer-events: none;  /* Evita che il testo interferisca con i click */
  }

/* Quando è attiva, si allunga verso sinistra perché il contenitore è ancorato a destra */
.center-pill.active {
  width: 285px; 
}

#searchField {
  width: 100%;
  border: none;
  outline: none;
  margin-left: -11px;
  background: transparent;
  font-size: 17px;
  font-family: inherit;
  display: none;
  caret-color: #ff9f0a; /* Barra lampeggiante arancione */
}

/* Nascondiamo lo span solo tramite una classe speciale gestita in JS */
.center-pill span.hidden {
  display: none !important;
}

.center-pill.active input {
  display: block !important;
}


.text-input-container {
  position: absolute;
  min-width: 50px;
  max-width: 80%;
  z-index: 10;
  background: transparent;
}

/* L'area di scrittura VERA */
.text-editable {
  width: 100%;
  min-height: 50px;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  color: black;
  white-space: pre-wrap;
  word-wrap: break-word;
  caret-color: #ff9f0a; /* Cursore arancione */
  
  /* TESTO NORMALE (Corpo) */
  font-size: 20px;
  font-weight: 400;
  line-height: 1.5;
}

/* TITOLO GIGANTE E GRASSO (Funziona solo sui div editabili) */
.text-editable::first-line {
  font-size: 50px;       /* Enorme */
  font-weight: 900;      /* Super Grasso */
  line-height: 1.1;
}

/* Placeholder per il titolo */
.text-editable:empty:before {
  content: "Titolo";
  color: #d1d1d6;
  pointer-events: none;
  display: block;
}

.dictation-dropdown {
  position: absolute;
  top: 70px; /* Posizionato sotto la barra superiore */
  right: 20px;
  width: 250px;
  background-color: rgba(242, 242, 247, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  display: none; /* Nascosto di default */
  z-index: 2001;
  padding: 15px;
  text-align: center;
}

.dictation-content p {
  font-size: 14px;
  margin-bottom: 15px;
  color: #000;
}

.dictation-content button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background-color: #fff;
  font-weight: 500;
  cursor: pointer;
}

.dictation-content button:first-of-type {
  color: #007aff; /* Colore blu stile iOS */
}


</style>
</head>
<body>

  <div id="lineBackground"></div>
  <canvas id="drawingCanvas"></canvas>

<div class="top-bar">
  <div class="btn-ui" onclick="undoLast()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/>
    </svg>
  </div>

  <div class="spacer"></div>

  <div class="pill-wrapper" style="margin-right: 334px; position: relative;
  transition: transform 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.08);
  z-index: 1001;">
    <div class="btn-pill-container" style="margin-right: 0;"> 
      
      <div class="btn-ui-inline" onclick="toggleMenu()">
        <div style="display:flex; gap:4px;"> 
          <div style="width:4px;height:4px;background:black;border-radius:50%"></div>
          <div style="width:4px;height:4px;background:black;border-radius:50%"></div>
          <div style="width:4px;height:4px;background:black;border-radius:50%"></div>
        </div>
      </div>

      <div class="btn-ui-inline" onclick="toggleShareDropdown()">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" stroke="black" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 9H7A2 2 0 0 0 5 11v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V11a2 2 0 0 0-2-2h-3"></path>
          <polyline points="9 5 13 1 17 5"></polyline>
          <line x1="13" y1="1" x2="13" y2="13"></line>
        </svg>
      </div>
    </div>


    <div id="shareDropdown" class="dropdown-menu">
  <div class="menu-content-wrapper">
    
    <div class="note-section">
      <div class="note-box" id="dynamicNoteIcon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19l7-7 3 3-7 7-3-3z"></path>

     <div class="dropdown-item" onclick="toggleShareDropdown()" style="justify-content: center; min-height: 50px;">
</div>

  </div>
</div>

  <div id="centerOverlay" class="center-overlay" onclick="closeCenterMenu()">

      <h3 style="text-align:center; margin-bottom: 20px;">Layout e Scrittura</h3>

        <div class="box" style="background:#d1d1d6" onclick="closeCenterMenu()"></div>

<div class="center-pill">
  <svg onclick="document.getElementById('searchField').focus()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px; flex-shrink: 0; cursor: pointer;">
    <circle cx="11" cy="11" r="8"></circle>
    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
  </svg>

         style="position: absolute; left: 46px; width: calc(100% - 90px); border: none; outline: none; background: transparent; font-size: 17px; font-family: inherit; display: none;">

<script>
  // Script invariato, gestisce canvas e menu
  const canvas = document.getElementById('drawingCanvas');
  const ctx = canvas.getContext('2d');
  let paths = []; 
  let currentPath = [];
  let startPos = { x: 0, y: 0 }; 

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    redrawCanvas();
  }
  window.addEventListener('resize', resize);
  resize();

  function toggleMenu() { document.getElementById('centerOverlay').style.display='flex'; }
  function closeCenterMenu() { document.getElementById('centerOverlay').style.display='none'; }

  function applyLayout(type) {
    const bg = document.getElementById('lineBackground');
    bg.innerHTML = '';
    if (type === 'lines' || type === 'grid') {
      for (let i = 85; i < window.innerHeight; i += 30) {
        let l = document.createElement('div'); l.className = 'bg-line'; l.style.top = i+'px';
        bg.appendChild(l);
      }
    }
    if (type === 'grid') {
      for (let j = 0; j < window.innerWidth; j += 30) {
        let v = document.createElement('div'); v.className = 'bg-grid-v'; v.style.left = j+'px';
        bg.appendChild(v);
      }
    }
    closeCenterMenu();
  }

  canvas.addEventListener('pointerdown', (e) => {
    currentPath = [{x: e.clientX, y: e.clientY}];
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (e.buttons !== 1) return;
    ctx.lineTo(e.clientX, e.clientY);
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';
    ctx.stroke();
    currentPath.push({x: e.clientX, y: e.clientY});
  });

   canvas.addEventListener('pointerup', (e) => {
    // Calcoliamo quanto si è mosso il dito tra inizio e fine tocco
    const dist = Math.sqrt(Math.pow(e.clientX - startPos.x, 2) + Math.pow(e.clientY - startPos.y, 2));
    
    if (dist < 5) {
      // Se il dito è rimasto fermo (distanza < 5px), scrivi
      createTextAt(e.clientX, e.clientY);
    } else if (currentPath.length > 0) {
      // Se il dito si è mosso, salva il disegno
      paths.push([...currentPath]);
    }
  });


 function undoLast() {
    paths.pop();
    redrawCanvas();
  }

  function redrawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    paths.forEach(path => {
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for(let i=1; i<path.length; i++) { ctx.lineTo(path[i].x, path[i].y); }
      ctx.lineWidth = 2.5; ctx.stroke();
    });
  }

function toggleShareDropdown() {
  const dropdown = document.getElementById('shareDropdown');
  const noteText = document.getElementById('noteStatusText');
  const noteIcon = document.getElementById('dynamicNoteIcon');

  if (dropdown.style.display === 'flex') {
    dropdown.style.display = 'none';
  } else {
    dropdown.style.display = 'flex';
    
    // Se ci sono tratti disegnati, cambia la scritta
    if (paths.length > 0) {
      noteText.innerText = "Nota Disegno";
      // Opzionale: mostra una "D" di Disegno o la prima lettera
      noteIcon.innerHTML = "D"; 
    } else {
      noteText.innerText = "Nuova Nota";
      noteIcon.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L4 2l3.5 12.5L13 18l5-5z"></path></svg>`;
    }
  }
}

  canvas.addEventListener('pointerdown', (e) => {
    // Chiude il menu share se clicchi sul foglio
    document.getElementById('shareDropdown').style.display = 'none';

    // Memorizziamo dove inizia il tocco per capire dopo se è un tap o un disegno
    startPos = { x: e.clientX, y: e.clientY }; 
    
    currentPath = [{x: e.clientX, y: e.clientY}];
    ctx.beginPath();
    ctx.moveTo(e.clientX, e.clientY);
  });


async function shareContent() {
  // 1. Trasforma il canvas in un file immagine (Blob)
  const canvas = document.getElementById('drawingCanvas');
  
  // Opzionale: Se vuoi condividere il disegno con lo sfondo bianco
  // (altrimenti il canvas è trasparente)
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.fillStyle = "white";
  tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
  tempCtx.drawImage(canvas, 0, 0);

  tempCanvas.toBlob(async (blob) => {
    const file = new File([blob], "disegno-sinny.png", { type: "image/png" });

    // 2. Controlla se il browser supporta la condivisione di file
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Sinny UI',
          text: 'Guarda cosa ho disegnato con Sinny!'
        });
        console.log("Condivisione riuscita");
      } catch (err) {
        console.error("Errore nella condivisione:", err);
      }
    } else {
      // Fallback per browser che non supportano la condivisione file
      alert("Il tuo browser non supporta la condivisione diretta. Prova a salvare l'immagine.");
    }
  }, 'image/png');
}

const searchPill = document.querySelector('.center-pill');
const searchField = document.getElementById('searchField');
const placeholderText = document.getElementById('placeholderText'); // Seleziona lo span
const menuPill = document.querySelector('.pill-wrapper');

searchPill.addEventListener('pointerdown', (e) => {
  e.stopPropagation();

  searchPill.classList.add('active');
  searchField.style.display = 'block';
  menuPill.style.transform = 'translateX(-12px)';
  
  searchField.focus();
});

// GESTIONE SCRITTURA: Scompare lo span solo se scrivo
searchField.addEventListener('input', () => {
  if (searchField.value.length > 0) {
    placeholderText.classList.add('hidden'); // Nasconde "Cerca..."
  } else {
    placeholderText.classList.remove('hidden'); // Ritorna se svuoto il testo
  }
});

searchField.addEventListener('blur', () => {
  if (searchField.value === "") {
    searchPill.classList.remove('active');
    searchField.style.display = 'none';
    placeholderText.classList.remove('hidden'); // Reset per sicurezza
    menuPill.style.transform = 'translateX(0)';
  }
});

searchField.addEventListener('pointerdown', (e) => e.stopPropagation());

function createTextAt(x, y) {
  if (document.querySelector('.text-input-container')) return;

  const container = document.createElement('div');
  container.className = 'text-input-container';
  container.style.left = '90px';  
  container.style.top = '90px';   
  container.style.width = 'calc(100% - 110px)';

  const editable = document.createElement('div');
  editable.className = 'text-editable';
  editable.contentEditable = "true"; // Questo lo rende scrivibile come una textarea
  editable.spellcheck = false;

  // Rimuove se vuoto quando perdi il focus
  editable.addEventListener('blur', function() {
    if (this.innerText.trim() === "") container.remove();
  });

  // Blocca interferenze col disegno
  container.addEventListener('pointerdown', (e) => e.stopPropagation());

  container.appendChild(editable);
  document.body.appendChild(container);
  
  // Porta il cursore dentro: sarà GIGANTE
  setTimeout(() => editable.focus(), 50);
}

async function activateDictationOnScreen(event) {
  // BLOCCA la propagazione: evita che la pillola riceva il click e "balli"
  event.preventDefault();
  event.stopPropagation();
  
  const searchField = document.getElementById('searchField');
  const pill = document.querySelector('.center-pill');
  const placeholder = document.getElementById('placeholderText');

  // 1. Setup grafico immediato
  pill.classList.add('active');
  searchField.style.display = 'block';
  placeholder.classList.add('hidden');
  searchField.focus();

  // 2. Richiesta Accesso Hardware (Fa apparire il menu "Consenti")
  try {
    // Chiediamo l'audio: se il sito è HTTPS, Safari mostrerà il popup privacy
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // Se arriviamo qui, l'utente ha cliccato "Consenti"
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'it-IT';
      recognition.continuous = false; // Si ferma appena smetti di parlare

      recognition.onstart = () => {
        searchField.value = "";
        searchField.placeholder = "Ti ascolto...";
      };

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        searchField.value = transcript;
        searchField.placeholder = "Cerca...";
        // Chiudiamo il microfono hardware per risparmiare batteria
        stream.getTracks().forEach(track => track.stop());
      };

      recognition.onerror = (e) => {
        console.error("Errore riconoscimento:", e.error);
      };

      recognition.start();
    }
  } catch (err) {
    // Se l'utente nega il permesso o siamo in data:text (ambiente non sicuro)
    console.warn("Accesso microfono negato:", err);
    searchField.placeholder = "Permesso negato";
    
    // Fallback: se siamo in data:text, l'unica soluzione è toccare il mic della tastiera
    setTimeout(() => { searchField.placeholder = "Usa il tasto sulla tastiera"; }, 2000);
  }
}

</script>
</body>
</html>
