name: Update Sinny
on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Dati JSON'
        required: true

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Create index files
        run: |
          # Leggiamo index_content e index2_content dal JSON inviato
          echo "${{ fromJson(github.event.inputs.file_content).index_content }}" | base64 --decode > index.html
          echo "${{ fromJson(github.event.inputs.file_content).index2_content }}" | base64 --decode > index2.html

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html index2.html
          git commit -m "Update from Shortcut"
          git push
