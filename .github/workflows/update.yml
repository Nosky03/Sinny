name: Update Sinny
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Nome del file (es. index.html)'
        required: true
      file_content:
        description: 'Contenuto Base64'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Create File
        run: |
          # Questo comando accetta qualsiasi nome file gli mandi (index o index2)
          printf "%s" "${{ github.event.inputs.file_content }}" | base64 --decode > ${{ github.event.inputs.filename }}

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update ${{ github.event.inputs.filename }}" || exit 0
          git push
