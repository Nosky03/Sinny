name: Update Sinny
on:
  workflow_dispatch:
    inputs:
      index_content:
        description: 'Base64 di index.html'
        required: true
      

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Create index.html
        run: |
          printf "%s" "${{ github.event.inputs.index_content }}" | base64 --decode > index.html

    
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Update index and index2 from Shortcut"
          git push
