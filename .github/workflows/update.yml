name: Update Sinny
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Nome del file'
        required: true
      file_content:
        description: 'Base64'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Create File
        run: |
          # Usiamo le virgolette per sicurezza
          echo "${{ github.event.inputs.file_content }}" | base64 --decode > "${{ github.event.inputs.filename }}"

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Aggiungiamo solo il file specifico che stiamo caricando
          git add "${{ github.event.inputs.filename }}"
          git commit -m "Update ${{ github.event.inputs.filename }}" || exit 0
          git push
