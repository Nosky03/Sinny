<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .controls { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 25px; z-index: 3100; 
        }

        .btn-ui { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 28px; 
            color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ok { background: #34c759; order: 1; }
        .retry { background: #ff3b30; order: 2; }

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">
    <div class="btn-side" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #d1d1d6; background: white;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
</a>

       <div class="btn-side" onclick="attivaCam()">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
    </svg>
</div>

<div class="btn-side" id="btn-gallery" onclick="document.getElementById('gallery-input').click()" style="overflow: hidden; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
</div>

        <div class="btn-side" onclick="attivaRitaglio()" title="Ritaglio Manuale">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2"><path d="M6 2L3 5l12 12h3l3-3V11L6 2z"></path><line x1="3" y1="21" x2="15" y2="9"></line></svg>
        </div>
        <div class="btn-side" onclick="modalitaRA()" id="btn-ra">
            R.A.
        </div>
        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

     <div class="viewport" id="viewport">



        
        <img id="final-photo">
        <canvas id="crop-canvas"></canvas>
    </div>



    <div id="cam-overlay" class="full-screen-cam">
        <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
        <video id="v" playsinline autoplay muted></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div id="shutter" onclick="scatta()"></div>
        <div class="controls" id="ui">
            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');

    let modeRA = false;
    let longPressTimer;

    // --- LOGICA R.A. (Simulazione Apple Intelligence) ---
    function modalitaRA() {
        if (finalImg.style.display === 'none') {
            alert("Scatta o carica una foto prima!");
            return;
        }
        modeRA = !modeRA;
        document.getElementById('btn-ra').style.background = modeRA ? '#007AFF' : 'white';
        document.getElementById('btn-ra').style.color = modeRA ? 'white' : '#007AFF';
        alert(modeRA ? "Modalità R.A. Attiva: Tieni premuto sul soggetto per ritagliarlo!" : "Modalità R.A. Disattivata");
    }

    // Gestione pressione prolungata (Long Press)
    finalImg.addEventListener('touchstart', (e) => {
        if (!modeRA) return;
        longPressTimer = setTimeout(() => {
            finalImg.classList.add('ai-active');
            // Qui in un'app vera chiameresti l'IA per segmentare l'immagine
            // Per ora simuliamo il ritaglio automatico dopo 1 secondo
            setTimeout(eseguiRitaglioAutomatico, 800);
        }, 600);
    });

    finalImg.addEventListener('touchend', () => {
        clearTimeout(longPressTimer);
        finalImg.classList.remove('ai-active');
    });

          function eseguiRitaglioAutomatico() {
        // 1. Prepariamo canvas e coordinate originali
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        const w = finalImg.naturalWidth;
        const h = finalImg.naturalHeight;
        
        tempCanvas.width = w;
        tempCanvas.height = h;

        // 2. Disegniamo l'immagine originale sul canvas temporaneo per analizzarla
        tempCtx.drawImage(finalImg, 0, 0, w, h);

        // 3. --- TRUCCO DI SEGMENTAZIONE AVANZATA (Simulazione IA) ---
        // Recuperiamo i dati dei pixel (RGBA) di tutta l'immagine
        const imageData = tempCtx.getImageData(0, 0, w, h);
        const pixels = imageData.data; // È un array enorme: [r,g,b,a, r,g,b,a, ...]

        // Analizziamo ogni pixel per decidere se è sfondo o chiave
        for (let i = 0; i < pixels.length; i += 4) {
            const r = pixels[i];     // Rosso
            const g = pixels[i + 1]; // Verde
            const b = pixels[i + 2]; // Blu
            
            // Calcoliamo la luminosità media del pixel
            const brightness = (r + g + b) / 3;

            // --- SOGLIA DI RITAGLIO ---
            // Se il pixel è molto chiaro (vicino al bianco dello sfondo, > 200),
            // lo rendiamo trasparente impostando il canale Alpha (a) a zero.
            // La chiave metallica è più scura, quindi verrà mantenuta.
            if (brightness > 200) { 
                pixels[i + 3] = 0; // Alpha = 0 (Trasparente)
            }
        }

        // 4. Mettiamo i pixel modificati (con lo sfondo cancellato) sul canvas
        tempCtx.putImageData(imageData, 0, 0);

        // 5. Applichiamo il risultato finale come PNG trasparente
        finalImg.src = tempCanvas.toDataURL('image/png');
        
        // 6. Animazione di "distacco" Apple Style (invariata)
        finalImg.style.transform = "scale(1.1)";
        finalImg.style.filter = "drop-shadow(0 15px 30px rgba(0,0,0,0.5))";
        
        setTimeout(() => {
            finalImg.style.transform = "scale(1)";
            finalImg.classList.remove('ai-active');
        }, 500);

        // Reset interfaccia
        modeRA = false;
        document.getElementById('btn-ra').style.background = 'white';
        document.getElementById('btn-ra').style.color = '#007AFF';
    }



    // --- FUNZIONI CAM E GALLERIA (Invariate) ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            overlay.style.display = 'block';
            v.style.display = 'block'; sh.style.display = 'block'; exitBtn.style.display = 'block';
            ui.style.display = 'none'; canvas.style.display = 'none';
        } catch (e) { alert("Accesso negato."); }
    }

    function scatta() {
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        v.style.display = 'none'; canvas.style.display = 'block';
        sh.style.display = 'none'; exitBtn.style.display = 'none'; ui.style.display = 'flex';
    }

    function reset() {
        v.style.display = 'block'; canvas.style.display = 'none';
        sh.style.display = 'block'; ui.style.display = 'none'; exitBtn.style.display = 'block';
    }

   function accettaFoto() {
    const dataUrl = canvas.toDataURL('image/png');
    finalImg.src = dataUrl;
    finalImg.style.display = 'block';
    aggiornaAnteprimaGalleria(dataUrl); // Aggiorna il quadratino
    chiudiCam();
}


    function chiudiCam() {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        overlay.style.display = 'none';
    }

   function caricaImmagine(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { 
        finalImg.src = e.target.result; 
        finalImg.style.display = 'block'; 
        aggiornaAnteprimaGalleria(e.target.result); // Aggiorna il quadratino
    };
    reader.readAsDataURL(file);
}


    function attivaRitaglio() {
        if (finalImg.style.display === 'none') return;
        cropCanvas.width = finalImg.clientWidth;
        cropCanvas.height = finalImg.clientHeight;
        cropCanvas.style.display = 'block';
    }

function aggiornaAnteprimaGalleria(sorgente) {
    const btnGallery = document.getElementById('btn-gallery');
    // Inserisce l'immagine scattata/caricata dentro il quadratino al posto dell'SVG
    btnGallery.innerHTML = `<img src="${sorgente}" style="width: 100%; height: 100%; object-fit: cover;">`;
}


</script>

</body>
</html>
