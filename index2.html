<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .controls { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 25px; z-index: 3100; 
        }

        .btn-ui { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 28px; 
            color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ok { background: #34c759; order: 1; }
        .retry { background: #ff3b30; order: 2; }

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

       /* Stile per il tasto ritaglio quando è attivo */
.btn-side.active {
    background: #d1d1d6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    border-color: #a1a1a6;
}


/* Sticker che si solleva e viene trascinato */
.sticker {
    position: absolute;
    z-index: 5000;
    cursor: grab;
    pointer-events: auto;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
}

.sticker.dragging {
    transition: none; /* Fluido durante il trascinamento */
    cursor: grabbing;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* Griglia uniforme: asse X ampio, asse Y compatto */
#grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 95%;
    display: none;
    
    /* Layout a griglia 3x4 */
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    
    /* Gap differenziato: 8px tra le colonne (X), 4px tra le righe (Y) */
    gap: 4px 8px; 
    
    /* Padding bilanciato: 
       Top: 10px (per non toccare il bordo alto)
       Right: 10px 
       Bottom: 40px (per lasciare spazio sicuro in basso)
       Left: 10px (distanza minima dalla sidebar) 
    */
    padding: 10px 10px 40px 10px; 
    
    background: #f2f2f7; 
    z-index: 100;
    box-sizing: border-box;
    
    /* Spostamento leggero verso l'alto per compensare la barra dell'iPad/Browser */
    transform: translateY( 0px);
}

.grid-cell {
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 1px solid #d1d1d6;
    
    /* Rimosso lo scale per occupare tutto lo spazio disponibile in modo uniforme */
    width: 100%;
    height: 100%;
}

/* Effetto al tocco */
.grid-cell:active {
    transform: scale(0.92);
    background: #e5e5ea;
}

/* Il "+" sottile e nero */
.grid-cell::before {
    content: '+';
    font-size: 20px;
    font-weight: 200; /* Più sottile */
    color: #000;      /* Nero */
    margin-bottom: 4px;
}

/* Etichette per i pantaloni */
.grid-cell::after {
    content: attr(data-label); /* Prende il testo dal JS */
    font-size: 10px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.grid-cell.filled::before, 
.grid-cell.filled::after { display: none; }

.grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 2. Classe per l'animazione di raccolta verso il tasto galleria */
.flying-photo {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
}

/* Etichetta gialla sotto lo shutter */
#ai-label {
    position: absolute;
    right: 20px;
    top: calc(50% + 60px); /* Sotto il cerchio shutter */
    transform: translateY(-50%);
    background: #FFD60A;
    color: black;
    padding: 5px 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
    z-index: 3200;
    display: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Titolo riconoscimento in alto */
#ai-header {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 18px;
    font-weight: bold;
    z-index: 3100;
    display: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.scan-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #FFD60A;
    border-radius: 50%;
    z-index: 3500;
    box-shadow: 0 0 15px #FFD60A;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); /* Transizione fluida per lo spostamento */
}

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">
    <div class="btn-side" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #d1d1d6; background: white;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
</a>

       <div class="btn-side" onclick="attivaCam()">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
    </svg>
</div>

<div class="btn-side" id="btn-gallery" onclick="document.getElementById('gallery-input').click()" style="overflow: hidden; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
</div>

<div class="btn-side" id="btn-crop" onclick="attivaRitaglio()" title="Ritaglio Manuale">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
    </svg>
</div>

     <div class="btn-side" onclick="modalitaRA()" id="btn-ra" title="Ritaglio Automatico">
    <svg width="34" height="34" viewBox="0 0 24 24" style="overflow: visible;">
        <circle cx="9" cy="12" r="7" fill="none" stroke="black" stroke-width="2" stroke-dasharray="3,2" />
        <text x="15" y="21" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">A.</text>
    </svg>
</div>

<div class="btn-side" onclick="modalitaCatalogo()" id="btn-catalog" title="Ritaglio Multiplo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="12" height="12" rx="2" stroke-dasharray="2,2"></rect>
        <rect x="3" y="3" width="12" height="12" rx="2" fill="white"></rect>
        <line x1="18" y1="15" x2="18" y2="21" stroke="#007AFF"></line>
        <line x1="15" y1="18" x2="21" y2="18" stroke="#007AFF"></line>
    </svg>
</div>


        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

<div class="viewport" id="viewport">
    <img id="final-photo">
    <canvas id="crop-canvas"></canvas>
    <div id="grid-container"></div>
</div>


<canvas id="ai-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3040; pointer-events: none;"></canvas>


    <div id="cam-overlay" class="full-screen-cam">
      <div id="ai-header">RICONOSCIMENTO...</div>
<div id="ai-label" onclick="toggleRecognition()">COSA È?</div>
        <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
        <video id="v" playsinline autoplay muted></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div id="shutter" onclick="scatta()"></div>
        <div class="controls" id="ui">
            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>
    </div>
</div>

<script>
    // --- RIFERIMENTI DOM ---
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    // --- STATO APPLICAZIONE ---
    let modeRA = false;
    let modeCatalogo = false;
    let drawPoints = []; 
    let tipoCorrente = "Pantalone"; 
    let riconoscimentoAvvenuto = false;
    let targetCell = null;
    let isDrawing = false;
    let cropActive = false;

    // --- ETICHETTE ---
    const etichettePantaloni = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Vita", "Tasche Dietro", "Zip / Bottoni", "Tessuto Close-up", "Orlo Fondo", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];
    const etichetteMaglie = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Collo", "Logo / Ricamo", "Etichetta Lavaggio", "Tessuto Close-up", "Dettaglio Polsino", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];

    // --- GESTIONE IMMAGINE (GALLERIA) ---
    function caricaImmagine(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => { 
            // Se la griglia è aperta, la chiudiamo per vedere la foto
            if (modeCatalogo) modalitaCatalogo(); 
            
            finalImg.src = e.target.result; 
            finalImg.style.display = 'block'; // Rende visibile l'immagine nello spazio bianco
            
            aggiornaAnteprimaGalleria(e.target.result); 
        };
        reader.readAsDataURL(file);
    }

    function aggiornaAnteprimaGalleria(sorgente) {
        const btnGallery = document.getElementById('btn-gallery');
        btnGallery.innerHTML = `<img src="${sorgente}" style="width: 100%; height: 100%; object-fit: cover;">`;
    }

    // --- FOTOCAMERA ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            
            if (!targetCell) {
                tipoCorrente = "Nessun vestito";
                riconoscimentoAvvenuto = false;
            }

            overlay.style.display = 'block';
            v.style.display = 'block'; 
            sh.style.display = 'block'; 
            exitBtn.style.display = 'block';
            
            document.getElementById('ai-label').style.display = targetCell ? 'none' : 'block';
            document.getElementById('ai-label').innerText = "COSA È?";
            document.getElementById('ai-header').style.display = 'none';
            
            ui.style.display = 'none'; 
            canvas.style.display = 'none';
        } catch (e) { alert("Errore fotocamera: controlla i permessi."); }
    }

    function scatta() {
        canvas.width = v.videoWidth; 
        canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        
        v.style.display = 'none'; 
        canvas.style.display = 'block';
        sh.style.display = 'none'; 
        exitBtn.style.display = 'none'; 
        ui.style.display = 'flex';
        
        const header = document.getElementById('ai-header');
        header.style.display = 'block';
        header.innerText = (tipoCorrente === "Nessun vestito") ? "NON RICONOSCIUTO" : tipoCorrente.toUpperCase();
    }

    function accettaFoto() {
        const dataUrl = canvas.toDataURL('image/png');
        
        if (targetCell) {
            targetCell.innerHTML = `<img src="${dataUrl}">`;
            targetCell.classList.add('filled');
            targetCell = null;
        } else if (riconoscimentoAvvenuto) {
            finalImg.style.display = 'none'; 
            if (!modeCatalogo) modalitaCatalogo(); 
            aggiornaNomiGriglia();
        } else {
            if (modeCatalogo) modalitaCatalogo();
            finalImg.src = dataUrl;
            finalImg.style.display = 'block';
        }

        aggiornaAnteprimaGalleria(dataUrl);
        chiudiCam();
    }

   function chiudiCam() {
    if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
    overlay.style.display = 'none';
    // Rimuove eventuali puntini rimasti
    document.querySelectorAll('.scan-dot').forEach(d => d.remove());
}


    function reset() {
        v.style.display = 'block'; 
        canvas.style.display = 'none';
        sh.style.display = 'block'; 
        ui.style.display = 'none'; 
        exitBtn.style.display = 'block';
    }

    // --- CATALOGO E GRIGLIA ---
    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.setAttribute('data-label', etichettePantaloni[i]); 
            cell.onclick = () => { targetCell = cell; attivaCam(); };
            container.appendChild(cell);
        }
    }
    creaGriglia();

    function modalitaCatalogo() {
        modeCatalogo = !modeCatalogo;
        const btn = document.getElementById('btn-catalog');
        const grid = document.getElementById('grid-container');
        
        if (modeCatalogo) {
            btn.style.background = '#007AFF';
            btn.querySelectorAll('rect, line').forEach(el => el.setAttribute('stroke', 'white'));
            grid.style.display = 'grid';
            finalImg.style.display = 'none';
        } else {
            btn.style.background = 'white';
            btn.querySelectorAll('rect').forEach(el => el.setAttribute('stroke', 'black'));
            btn.querySelector('line').setAttribute('stroke', '#007AFF');
            grid.style.display = 'none';
            if(finalImg.src) finalImg.style.display = 'block';
        }
    }

    function aggiornaNomiGriglia() {
        const cells = document.querySelectorAll('.grid-cell');
        let labels = (tipoCorrente === "Maglia") ? etichetteMaglie : (tipoCorrente === "Pantalone" ? etichettePantaloni : Array(12).fill("Oggetto"));
        cells.forEach((cell, i) => {
            if (!cell.classList.contains('filled')) cell.setAttribute('data-label', labels[i] || "Extra");
        });
    }

    // --- INTELLIGENZA ARTIFICIALE (RITAGLIO & RECOG) ---
   function toggleRecognition() {
    const aiLabel = document.getElementById('ai-label');
    const aiHeader = document.getElementById('ai-header');

    if (tipoCorrente === "Nessun vestito") {
        tipoCorrente = "Maglia";
        mostraPuntiScansione(); // Avvia i 12 puntini
    } else if (tipoCorrente === "Maglia") {
        tipoCorrente = "Pantalone";
        aiHeader.innerText = "RICONOSCIMENTO...";
        aiHeader.style.color = "white";
        aiLabel.innerText = "RILEVATO: PANTALONE";
        riconoscimentoAvvenuto = true;
    } else {
        tipoCorrente = "Nessun vestito";
        aiHeader.style.display = 'none';
        aiLabel.innerText = "COSA È?";
        riconoscimentoAvvenuto = false;
    }
}


    function attivaRitaglio() {
        if (finalImg.style.display === 'none' || !finalImg.src) return;
        cropActive = !cropActive;
        const btn = document.getElementById('btn-crop');
        
        if (cropActive) {
            btn.classList.add('active');
            const dpr = window.devicePixelRatio || 1;
            const rect = viewport.getBoundingClientRect();
            cropCanvas.width = rect.width * dpr;
            cropCanvas.height = rect.height * dpr;
            cropCanvas.style.width = rect.width + "px";
            cropCanvas.style.height = rect.height + "px";
            ctxCrop.scale(dpr, dpr);
            cropCanvas.style.display = 'block';
            initDrawing();
        } else {
            btn.classList.remove('active');
            cropCanvas.style.display = 'none';
            ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
        }
    }

    function initDrawing() {
        ctxCrop.strokeStyle = "white";
        ctxCrop.lineWidth = 3;
        ctxCrop.setLineDash([10, 10]);
        
        const getPos = (e) => {
            const rect = cropCanvas.getBoundingClientRect();
            return {
                x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
                y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
            };
        };

        cropCanvas.onmousedown = cropCanvas.ontouchstart = (e) => {
            isDrawing = true;
            drawPoints = [];
            ctxCrop.beginPath();
            const pos = getPos(e);
            ctxCrop.moveTo(pos.x, pos.y);
            drawPoints.push(pos);
        };

        cropCanvas.onmousemove = cropCanvas.ontouchmove = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctxCrop.lineTo(pos.x, pos.y);
            ctxCrop.stroke();
            drawPoints.push(pos);
        };

        window.onmouseup = window.ontouchend = () => {
            if (!isDrawing) return;
            isDrawing = false;
            finalImg.classList.add('ai-active');
            setTimeout(() => {
                eseguiTaglioManuale();
                finalImg.classList.remove('ai-active');
                attivaRitaglio();
            }, 600);
        };
    }

    function eseguiTaglioManuale() {
        if (drawPoints.length < 3) return;
        const tempCanvas = document.createElement('canvas');
        const tCtx = tempCanvas.getContext('2d');
        tempCanvas.width = finalImg.naturalWidth;
        tempCanvas.height = finalImg.naturalHeight;

        const scaleX = tempCanvas.width / cropCanvas.offsetWidth;
        const scaleY = tempCanvas.height / cropCanvas.offsetHeight;

        tCtx.beginPath();
        tCtx.moveTo(drawPoints[0].x * scaleX, drawPoints[0].y * scaleY);
        drawPoints.forEach(p => tCtx.lineTo(p.x * scaleX, p.y * scaleY));
        tCtx.closePath();
        tCtx.clip(); 
        tCtx.drawImage(finalImg, 0, 0);

        finalImg.src = tempCanvas.toDataURL('image/png');
    }

function mostraPuntiScansione() {
    const aiLabel = document.getElementById('ai-label');
    const aiHeader = document.getElementById('ai-header');
    const aiCanvas = document.getElementById('ai-canvas');
    const ctx = aiCanvas.getContext('2d');
    
    aiCanvas.width = window.innerWidth;
    aiCanvas.height = window.innerHeight;
    aiLabel.innerText = "CALIBRAZIONE SENSORI...";

    const dots = [];
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    const radius = 90;

    // 1. Inizializzazione con rotazione ad alta frequenza
    for (let i = 0; i < 14; i++) { // Aumentati a 14 per più dettaglio
        const dot = document.createElement('div');
        dot.className = 'scan-dot';
        overlay.appendChild(dot);
        dots.push({ el: dot, angle: (i / 14) * Math.PI * 2, locked: false });
    }

    let startTime = Date.now();
    function orbit() {
        const elapsed = Date.now() - startTime;
        if (elapsed < 1000) {
            dots.forEach(d => {
                const curAngle = d.angle + (elapsed / 150);
                d.el.style.left = `${centerX + Math.cos(curAngle) * radius}px`;
                d.el.style.top = `${centerY + Math.sin(curAngle) * radius}px`;
            });
            requestAnimationFrame(orbit);
        } else {
            rilevamentoDinamico();
        }
    }
    orbit();

    // 2. LOGICA TECNOLOGICA: Generazione coordinate in base ai confini
    function rilevamentoDinamico() {
        aiLabel.innerText = "ANALISI SCANNER V-RAY...";
        
        const w = window.innerWidth;
        const h = window.innerHeight;

        // Simuliamo il rilevamento dei bordi reali (bounding box dinamica)
        // Se l'utente inquadra, l'algoritmo "trova" questi punti nel volume
        const bounds = {
            top: h * 0.25 + (Math.random() * 20),
            bottom: h * 0.80 - (Math.random() * 20),
            left: w * 0.20 + (Math.random() * 30),
            right: w * 0.80 - (Math.random() * 30),
            midX: w / 2
        };

        // Creazione "Skeleton" dinamico basato sul tipo (Maglia)
        const dynamicShape = [
            {x: bounds.midX, y: bounds.top},             // Collo Central
            {x: bounds.left + 40, y: bounds.top + 15},   // Spalla SX
            {x: bounds.left - 20, y: bounds.top + 100},  // Manica SX (braccio)
            {x: bounds.left - 10, y: bounds.bottom - 150},// Polso SX
            {x: bounds.left + 50, y: bounds.bottom - 160},// Ascella SX
            {x: bounds.left + 45, y: bounds.bottom},     // Fondo SX
            {x: bounds.right - 45, y: bounds.bottom},    // Fondo DX
            {x: bounds.right - 50, y: bounds.bottom - 160},// Ascella DX
            {x: bounds.right + 10, y: bounds.bottom - 150},// Polso DX
            {x: bounds.right + 20, y: bounds.top + 100}, // Manica DX (braccio)
            {x: bounds.right - 40, y: bounds.top + 15},  // Spalla DX
            {x: bounds.midX, y: bounds.top}              // Chiusura
        ];

        // Spostamento dei punti con "aggancio" magnetico
        dots.forEach((d, i) => {
            if (dynamicShape[i]) {
                d.el.style.transform = "scale(1.5)";
                d.el.style.background = "#007AFF"; // Blu durante il lock
                d.el.style.left = `${dynamicShape[i].x}px`;
                d.el.style.top = `${dynamicShape[i].y}px`;
            } else {
                d.el.style.opacity = "0"; // Nascondi punti extra
            }
        });

        setTimeout(() => renderTechLines(dynamicShape), 500);
    }

    // 3. Rendering Linee con effetto "Neural Link"
    function renderTechLines(points) {
        let step = 0;
        aiLabel.innerText = "STRUTTURA IDENTIFICATA";

        function drawFrame() {
            ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
            
            // Effetto bagliore
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0, 122, 255, 0.5)";
            
            ctx.beginPath();
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = "#007AFF";
            ctx.setLineDash([2, 4]); // Linea tecnica sottile

            ctx.moveTo(points[0].x, points[0].y);
            
            for (let i = 1; i < step; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            
            ctx.stroke();

            // Disegna piccoli vettori di dati accanto ai punti
            if (step < points.length) {
                const p = points[step];
                ctx.fillStyle = "#007AFF";
                ctx.font = "8px monospace";
                ctx.fillText(`LOK_POINT_${step}: ${Math.floor(p.x)}px`, p.x + 10, p.y - 10);
                
                step += 0.5;
                requestAnimationFrame(drawFrame);
            } else {
                ctx.setLineDash([]);
                ctx.stroke();
                // Chiudi la forma con un riempimento leggero
                ctx.fillStyle = "rgba(0, 122, 255, 0.05)";
                ctx.fill();
                concludiAnalisi();
            }
        }
        drawFrame();
    }

    function concludiAnalisi() {
        // Feedback Apple Intelligence finale
        aiHeader.style.display = 'block';
        aiHeader.innerText = "MATCH 99.8% - MAGLIA";
        aiHeader.style.color = "#34c759";
        aiLabel.innerText = "DATA ACQUIRED";
        riconoscimentoAvvenuto = true;

        setTimeout(() => {
            ctx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);
            document.querySelectorAll('.scan-dot').forEach(d => {
                d.style.transform = "scale(0)";
                setTimeout(() => d.remove(), 300);
            });
        }, 1200);
    }
}

</script>
