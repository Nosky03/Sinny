<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

       .controls { 
    position: absolute; 
    right: 20px; 
    top: 50%; 
    transform: translateY(-50%);
    display: none; /* Nasconde inizialmente i tasti */
    flex-direction: column; 
    gap: 15px; /* Ridotto gap per stare sotto l'etichetta */
    z-index: 3100; 
}

        .btn-ui { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 28px; 
            color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ok { background: #34c759; order: 1; }
        .retry { background: #ff3b30; order: 2; }

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

       /* Stile per il tasto ritaglio quando è attivo */
.btn-side.active {
    background: #d1d1d6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    border-color: #a1a1a6;
}


/* Sticker che si solleva e viene trascinato */
.sticker {
    position: absolute;
    z-index: 5000;
    cursor: grab;
    pointer-events: auto;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
}

.sticker.dragging {
    transition: none; /* Fluido durante il trascinamento */
    cursor: grabbing;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* Griglia uniforme: asse X ampio, asse Y compatto */
#grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 95%;
    display: none;
    
    /* Layout a griglia 3x4 */
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    
    /* Gap differenziato: 8px tra le colonne (X), 4px tra le righe (Y) */
    gap: 4px 8px; 
    
    /* Padding bilanciato: 
       Top: 10px (per non toccare il bordo alto)
       Right: 10px 
       Bottom: 40px (per lasciare spazio sicuro in basso)
       Left: 10px (distanza minima dalla sidebar) 
    */
    padding: 10px 10px 40px 10px; 
    
    background: #f2f2f7; 
    z-index: 100;
    box-sizing: border-box;
    
    /* Spostamento leggero verso l'alto per compensare la barra dell'iPad/Browser */
    transform: translateY( 0px);
}

.grid-cell {
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 1px solid #d1d1d6;
    
    /* Rimosso lo scale per occupare tutto lo spazio disponibile in modo uniforme */
    width: 100%;
    height: 100%;
}

/* Effetto al tocco */
.grid-cell:active {
    transform: scale(0.92);
    background: #e5e5ea;
}

/* Il "+" sottile e nero */
.grid-cell::before {
    content: '+';
    font-size: 20px;
    font-weight: 200; /* Più sottile */
    color: #000;      /* Nero */
    margin-bottom: 4px;
}

/* Etichette per i pantaloni */
.grid-cell::after {
    content: attr(data-label); /* Prende il testo dal JS */
    font-size: 10px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.grid-cell.filled::before, 
.grid-cell.filled::after { display: none; }

.grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 2. Classe per l'animazione di raccolta verso il tasto galleria */
.flying-photo {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
}

/* Etichetta gialla sotto lo shutter */

    position: absolute;
    right: 20px;
    top: calc(50% + 80px); /* Abbassata per lasciare spazio ai tasti sopra */
    background: #FFD60A !important; /* Forza il giallo sempre */
    color: black;
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
    z-index: 3200;
    display: none;
    cursor: pointer;
}

/* Titolo riconoscimento in alto */
#ai-header {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 18px;
    font-weight: bold;
    z-index: 3100;
    display: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Puntini di scansione animati */
.scan-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #FFD60A;
    border-radius: 50%;
    z-index: 3500;
    box-shadow: 0 0 10px #FFD60A;
    pointer-events: none;
}

.manual-dot {
    position: absolute;
    width: 20px; /* Più grande per toccarlo meglio */
    height: 20px;
    background: #FFD60A;
    border: 2px solid white;
    border-radius: 50%;
    z-index: 4000;
    transform: translate(-50%, -50%);
    touch-action: none; /* Impedisce lo scroll mentre trascini */
}
.manual-dot.dragging {
    background: #34c759;
    transform: translate(-50%, -50%) scale(1.5);
}

/* Linee che collegano i punti */
.conn-line {
    position: absolute;
    background: #FFD60A;
    height: 2px;
    z-index: 3900;
    transform-origin: 0 0;
    pointer-events: none;
}

/* Poligono colorato finale */
#clothing-shape {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3800;
    pointer-events: none;
}

#btn-confirm-points, #btn-finish, #btn-undo {
    order: 10; /* Li sposta in fondo alla lista flex */
}

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">
    <div class="btn-side" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #d1d1d6; background: white;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
</a>

       <div class="btn-side" onclick="attivaCam()">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
    </svg>
</div>

<div class="btn-side" id="btn-gallery" onclick="document.getElementById('gallery-input').click()" style="overflow: hidden; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
</div>

<div class="btn-side" id="btn-crop" onclick="attivaRitaglio()" title="Ritaglio Manuale">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>

</div>

     <div class="btn-side" onclick="modalitaRA()" id="btn-ra" title="Ritaglio Automatico">
    <svg width="34" height="34" viewBox="0 0 24 24" style="overflow: visible;">
        <circle cx="9" cy="12" r="7" fill="none" stroke="black" stroke-width="2" stroke-dasharray="3,2" />
        <text x="15" y="21" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">A.</text>
    </svg>
</div>

<div class="btn-side" onclick="modalitaCatalogo()" id="btn-catalog" title="Ritaglio Multiplo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="12" height="12" rx="2" stroke-dasharray="2,2"></rect>
        <rect x="3" y="3" width="12" height="12" rx="2" fill="white"></rect>
        <line x1="18" y1="15" x2="18" y2="21" stroke="#007AFF"></line>
        <line x1="15" y1="18" x2="21" y2="18" stroke="#007AFF"></line>
    </svg>
</div>


        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

<div class="viewport" id="viewport">
    <img id="final-photo">
    <canvas id="crop-canvas"></canvas>
    <div id="grid-container"></div>
</div>




<div id="cam-overlay" class="full-screen-cam">
    <div id="ai-header" style="top: 60px; color: white; display: none;">MODALITÀ: cosa è?</div>
    
    <div id="ai-label" onclick="toggleRecognition()">COSA È?</div>
    
    <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
    
    <video id="v" playsinline autoplay muted></video>
    <canvas id="preview-canvas" style="display:none;"></canvas>
    
    <div id="drawing-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:3050; display:none; pointer-events: auto;">
        <svg id="clothing-shape" style="width:100%; height:100%;"></svg>
    </div>

    <div id="shutter" onclick="scatta()"></div>

    <div class="controls" id="ui">
        <button class="btn-ui ok" id="btn-photo-ok" onclick="accettaFoto()">✓</button>
        <button class="btn-ui retry" onclick="reset()">↺</button>
        
        <button id="btn-confirm-points" class="btn-ui" style="display:none; background: #34c759;" onclick="fermaAggiuntaPunti()">OK</button>
        <button id="btn-finish" class="btn-ui" style="display:none; background: #007AFF;" onclick="concludiPunti()">Fine</button>
        <button id="btn-undo" class="btn-ui" style="display:none; background: #5856d6;" onclick="rimuoviUltimoPunto()">⤺</button>
    </div>
</div>





<div id="drawing-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:3500; display:none;">
    <svg id="clothing-shape"></svg>
</div>

            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>
    </div>
</div>

<script>
    // --- RIFERIMENTI DOM ---
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    // --- STATO APPLICAZIONE ---
    let modeRA = false;
    let modeCatalogo = false;
    let drawPoints = []; 
    let tipoCorrente = "Pantalone"; 
    let riconoscimentoAvvenuto = false;
    let targetCell = null;
    let isDrawing = false;
    let cropActive = false;
    let manualPoints = []; // Salva le coordinate dei tuoi tocchi
    let isManualMode = false; // Capisce se siamo in "Cosa è"


    // --- ETICHETTE ---
    const etichettePantaloni = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Vita", "Tasche Dietro", "Zip / Bottoni", "Tessuto Close-up", "Orlo Fondo", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];
    const etichetteMaglie = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Collo", "Logo / Ricamo", "Etichetta Lavaggio", "Tessuto Close-up", "Dettaglio Polsino", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];

    // --- GESTIONE IMMAGINE (GALLERIA) ---
    function caricaImmagine(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => { 
            // Se la griglia è aperta, la chiudiamo per vedere la foto
            if (modeCatalogo) modalitaCatalogo(); 
            
            finalImg.src = e.target.result; 
            finalImg.style.display = 'block'; // Rende visibile l'immagine nello spazio bianco
            
            aggiornaAnteprimaGalleria(e.target.result); 
        };
        reader.readAsDataURL(file);
    }

    function aggiornaAnteprimaGalleria(sorgente) {
        const btnGallery = document.getElementById('btn-gallery');
        btnGallery.innerHTML = `<img src="${sorgente}" style="width: 100%; height: 100%; object-fit: cover;">`;
    }

    // --- FOTOCAMERA ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            
            if (!targetCell) {
                tipoCorrente = "Nessun vestito";
                riconoscimentoAvvenuto = false;
            }

            overlay.style.display = 'block';
            v.style.display = 'block'; 
            sh.style.display = 'block'; 
            exitBtn.style.display = 'block';
            
            document.getElementById('ai-label').style.display = targetCell ? 'none' : 'block';
            document.getElementById('ai-label').innerText = "COSA È?";
            document.getElementById('ai-header').style.display = 'none';
            
            ui.style.display = 'none'; 
            canvas.style.display = 'none';
        } catch (e) { alert("Errore fotocamera: controlla i permessi."); }
    }

   function scatta() {
    canvas.width = v.videoWidth; 
    canvas.height = v.videoHeight;
    canvas.getContext('2d').drawImage(v, 0, 0);
    
    v.style.display = 'none'; 
    canvas.style.display = 'block';
    sh.style.display = 'none'; 
    exitBtn.style.display = 'none'; 
    ui.style.display = 'flex';

    // Se eravamo in modalità "Cosa è" (tipoCorrente non è nullo)
    if(tipoCorrente !== "Nessun vestito") {
        isManualMode = true;
        document.getElementById('drawing-layer').style.display = 'block';
        attivaTouchPunti();
    }
}


    function accettaFoto() {
        const dataUrl = canvas.toDataURL('image/png');
        
        if (targetCell) {
            targetCell.innerHTML = `<img src="${dataUrl}">`;
            targetCell.classList.add('filled');
            targetCell = null;
        } else if (riconoscimentoAvvenuto) {
            finalImg.style.display = 'none'; 
            if (!modeCatalogo) modalitaCatalogo(); 
            aggiornaNomiGriglia();
        } else {
            if (modeCatalogo) modalitaCatalogo();
            finalImg.src = dataUrl;
            finalImg.style.display = 'block';
        }

        aggiornaAnteprimaGalleria(dataUrl);
        chiudiCam();
    }

   function chiudiCam() {
    if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
    overlay.style.display = 'none';
    // Rimuove eventuali puntini rimasti
    document.querySelectorAll('.scan-dot').forEach(d => d.remove());
}


    function reset() {
        v.style.display = 'block'; 
        canvas.style.display = 'none';
        sh.style.display = 'block'; 
        ui.style.display = 'none'; 
        exitBtn.style.display = 'block';
    }

    // --- CATALOGO E GRIGLIA ---
    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.setAttribute('data-label', etichettePantaloni[i]); 
            cell.onclick = () => { targetCell = cell; attivaCam(); };
            container.appendChild(cell);
        }
    }
    creaGriglia();

    function modalitaCatalogo() {
        modeCatalogo = !modeCatalogo;
        const btn = document.getElementById('btn-catalog');
        const grid = document.getElementById('grid-container');
        
        if (modeCatalogo) {
            btn.style.background = '#007AFF';
            btn.querySelectorAll('rect, line').forEach(el => el.setAttribute('stroke', 'white'));
            grid.style.display = 'grid';
            finalImg.style.display = 'none';
        } else {
            btn.style.background = 'white';
            btn.querySelectorAll('rect').forEach(el => el.setAttribute('stroke', 'black'));
            btn.querySelector('line').setAttribute('stroke', '#007AFF');
            grid.style.display = 'none';
            if(finalImg.src) finalImg.style.display = 'block';
        }
    }

    function aggiornaNomiGriglia() {
        const cells = document.querySelectorAll('.grid-cell');
        let labels = (tipoCorrente === "Maglia") ? etichetteMaglie : (tipoCorrente === "Pantalone" ? etichettePantaloni : Array(12).fill("Oggetto"));
        cells.forEach((cell, i) => {
            if (!cell.classList.contains('filled')) cell.setAttribute('data-label', labels[i] || "Extra");
        });
    }

// --- INTELLIGENZA ARTIFICIALE (SISTEMA MANUALE PUNTI) ---

// --- LOGICA MODALITÀ "COSA È" (MANUAL POINTS) ---

let editingLocked = false;

// 1. Attivazione Modalità (Sempre Gialla)
function toggleRecognition() {
    const aiLabel = document.getElementById('ai-label');
    const aiHeader = document.getElementById('ai-header');

    if (tipoCorrente === "Nessun vestito") {
        tipoCorrente = "Attivo"; 
        aiHeader.style.display = 'block';
        aiHeader.innerText = "MODALITÀ: cosa è?";
        aiLabel.style.background = "#FFD60A";
        aiLabel.style.color = "black";
    } else {
        tipoCorrente = "Nessun vestito";
        aiHeader.style.display = 'none';
        aiLabel.style.background = "#FFD60A";
    }
}

// 2. Gestione Tocchi sul Layer (Aggiunta Punti)
function attivaTouchPunti() {
    const layer = document.getElementById('drawing-layer');
    
    layer.onclick = function(e) {
        // Blocca l'aggiunta se clicchi sui tasti UI, sui punti esistenti o se la modifica è bloccata (dopo OK)
        if (e.target.closest('.controls') || e.target.classList.contains('manual-dot') || !isManualMode || editingLocked) {
            return;
        }

        const rect = layer.getBoundingClientRect();
        manualPoints.push({ x: e.clientX - rect.left, y: e.clientY - rect.top });
        
        // Mostra tasti di gestione
        document.getElementById('btn-confirm-points').style.display = 'flex';
        document.getElementById('btn-undo').style.display = 'flex';
        disegnaPunti();
    };
}

// 3. Funzione Disegno (SVG + Pallini)
function disegnaPunti() {
    const layer = document.getElementById('drawing-layer');
    const svg = document.getElementById('clothing-shape');
    
    // Pulisce i vecchi pallini visivi
    layer.querySelectorAll('.manual-dot').forEach(d => d.remove());

    let polyPoints = manualPoints.map(p => `${p.x},${p.y}`).join(" ");
    
    if (manualPoints.length > 2) {
        svg.innerHTML = `<polygon points="${polyPoints}" style="fill:rgba(255, 214, 10, 0.3); stroke:#FFD60A; stroke-width:3" />`;
    } else {
        svg.innerHTML = `<polyline points="${polyPoints}" style="fill:none; stroke:#FFD60A; stroke-width:3" />`;
    }

    // Ricrea i pallini interattivi
    manualPoints.forEach((p, index) => {
        const dot = document.createElement('div');
        dot.className = 'manual-dot';
        dot.style.left = p.x + 'px';
        dot.style.top = p.y + 'px';
        
        // Permette il trascinamento solo dopo aver premuto OK (editingLocked = true)
        dot.ontouchmove = (e) => {
            if (!editingLocked) return;
            const touch = e.touches[0];
            const rect = layer.getBoundingClientRect();
            p.x = touch.clientX - rect.left;
            p.y = touch.clientY - rect.top;
            disegnaPunti();
        };

        layer.appendChild(dot);
    });
}

// 4. Conferma Punti (Tasto OK) -> Passa allo spostamento
function fermaAggiuntaPunti(e) {
    if(e) e.stopPropagation();
    editingLocked = true;
    
    document.getElementById('btn-confirm-points').style.display = 'none';
    document.getElementById('btn-finish').style.display = 'flex';
    
    const undoBtn = document.getElementById('btn-undo');
    undoBtn.innerText = "✎"; // Icona modifica per tornare indietro
    undoBtn.onclick = (event) => {
        event.stopPropagation();
        editingLocked = false;
        undoBtn.innerText = "⤺";
        undoBtn.onclick = rimuoviUltimoPunto;
        document.getElementById('btn-finish').style.display = 'none';
        document.getElementById('btn-confirm-points').style.display = 'flex';
    };
}

// 5. Rimuovi punto (Tasto Indietro)
function rimuoviUltimoPunto(e) {
    if(e) e.stopPropagation();
    manualPoints.pop();
    if(manualPoints.length === 0) {
        document.getElementById('btn-confirm-points').style.display = 'none';
        document.getElementById('btn-undo').style.display = 'none';
    }
    disegnaPunti();
}

// 6. Analisi Finale (Tasto Fine)
function concludiPunti(e) {
    if(e) e.stopPropagation();
    const n = manualPoints.length;
    const aiHeader = document.getElementById('ai-header');
    
    // Pulisce l'interfaccia dai pallini di editing
    document.querySelectorAll('.manual-dot').forEach(d => d.remove());
    
    if (n >= 10 && n <= 14) {
        aiHeader.innerText = "RILEVATA: MAGLIA";
        tipoCorrente = "Maglia";
    } else if (n >= 6 && n <= 9) {
        aiHeader.innerText = "RILEVATO: PANTALONE";
        tipoCorrente = "Pantalone";
    } else {
        aiHeader.innerText = "OGGETTO RILEVATO (" + n + " PUNTI)";
    }
    
    riconoscimentoAvvenuto = true;
    document.getElementById('btn-finish').style.display = 'none';
    document.getElementById('btn-undo').style.display = 'none';
    isManualMode = false; // Disabilita ulteriori interazioni
}

</script>
