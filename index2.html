<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px; position: relative;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

/* Menu controlli ( OK/RETRY) dopo scatt */
.controls { 
    position: absolute; 
    right: 20px; 
    top: calc(50% + 80px); /* Allineato all'altezza della label gialla */
    display: none; 
    flex-direction: column; 
    gap: 10px; /* Distanza uguale tra gli elementi */
    z-index: 4100;
    align-items: flex-end; /* Allinea a destra come la label */
}

/* Bottoni UI Base */
.btn-ui { 
    width: 50px; height: 50px; border-radius: 50%; display: flex; 
    align-items: center; justify-content: center; font-size: 20px; 
    color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Modalità Cosa è: Trasforma in contenitori rettangolari larghi come la label gialla */
.btn-ui.pill {
    width: 85px; /* Larghezza adeguata alla label "COSA È?" */
    height: 32px; 
    border-radius: 10px;
    font-size: 11px;
    font-weight: bold;
}

/* Colori e ordine */
.ok { background: #34c759; order: 1; }
.retry { background: #ff3b30; order: 2; }

/* Simbolo Retry come freccia curva per modalità semplice */
.retry::before { content: '⤶'; font-size: 28px; }
.btn-ui.pill.retry::before { content: 'RIPROVA'; font-size: 11px; }

/* Sticker per trascinamento multiplo */
.multi-sticker {
    position: fixed;
    pointer-events: none;
    z-index: 6000;
    transition: transform 0.1s ease;
}

.stacked-photo {
    position: absolute;
    width: 100%; height: 100%;
    border: 2px solid white;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    object-fit: cover;
}

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050; margin: 0;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

       /* Stile per il tasto ritaglio quando è attivo */
.btn-side.active {
    background: #d1d1d6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    border-color: #a1a1a6;
}


/* Sticker che si solleva e viene trascinato */
.sticker {
    position: absolute;
    z-index: 5000;
    cursor: grab;
    pointer-events: auto;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
}

.sticker.dragging {
    transition: none; /* Fluido durante il trascinamento */
    cursor: grabbing;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* Griglia uniforme: asse X ampio, asse Y compatto */
#grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 95%;
    display: none;
    
    /* Layout a griglia 3x4 */
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    
    /* Gap differenziato: 8px tra le colonne (X), 4px tra le righe (Y) */
    gap: 4px 8px; 
    
    /* Padding bilanciato: 
       Top: 10px (per non toccare il bordo alto)
       Right: 10px 
       Bottom: 40px (per lasciare spazio sicuro in basso)
       Left: 10px (distanza minima dalla sidebar) 
    */
    padding: 10px 10px 40px 10px; 
    
    background: #f2f2f7; 
    z-index: 100;
    box-sizing: border-box;
    
    /* Spostamento leggero verso l'alto per compensare la barra dell'iPad/Browser */
    transform: translateY( 0px);
}

.grid-cell {
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
   overflow: visible !important;
    cursor: pointer;
    position: relative;
    border: 1px solid #d1d1d6;
    
    /* Rimosso lo scale per occupare tutto lo spazio disponibile in modo uniforme */
    width: 100%;
    height: 100%;
}

/* Effetto al tocco */
.grid-cell:active {
    transform: scale(0.92);
    background: #e5e5ea;
}

/* Il "+" sottile e nero */
.grid-cell::before {
    content: '+';
    font-size: 20px;
    font-weight: 200; /* Più sottile */
    color: #000;      /* Nero */
    margin-bottom: 4px;
}

/* Etichette per i pantaloni */
.grid-cell::after {
    content: attr(data-label); /* Prende il testo dal JS */
    font-size: 10px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.grid-cell.filled::before, 
.grid-cell.filled::after { display: none; }

.grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 2. Classe per l'animazione di raccolta verso il tasto galleria */
.flying-photo {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
}

/* Etichetta gialla sotto lo shutter */
#ai-label {
    position: absolute;
    right: 20px;
    top: calc(50% + 55px); /* Sotto il cerchio shutter */
    transform: translateY(-50%);
    background: #FFD60A;
    color: black;
    padding: 5px 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
    z-index: 3200;
    display: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Inseriscilo nel blocco <style> */
.hide-ai-label {
    display: none !important;
}


/* Titolo riconoscimento in alto */
#ai-header {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 18px;
    font-weight: bold;
    z-index: 3100;
    display: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* Puntini di scansione animati */
.scan-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #FFD60A;
    border-radius: 50%;
    z-index: 3500;
    box-shadow: 0 0 10px #FFD60A;
    pointer-events: none;
}

/* Punti che metterai tu sulla foto */
.manual-dot {
    position: absolute;
    width: 12px;
    height: 12px;
    background: #FFD60A;
    border: 2px solid white;
    border-radius: 50%;
    z-index: 4000;
    transform: translate(-50%, -50%);
}

/* Linee che collegano i punti */
.conn-line {
    position: absolute;
    background: #FFD60A;
    height: 2px;
    z-index: 3900;
    transform-origin: 0 0;
    pointer-events: none;
}

/* Poligono colorato finale */
#clothing-shape {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 3800;
    pointer-events: none;
}

/* Assicurati che il layer dei punti non mangi i click se non necessario */
#drawing-layer {
    position: absolute; 
    top: 0; left: 0; 
    width: 100%; height: 100%; 
    z-index: 3500; 
    display: none; 
    pointer-events: auto; /* Di base cattura i click */
}

/* Quando questa classe è attiva, i punti sono ignorati e i bottoni funzionano */
.allow-buttons {
    pointer-events: none !important;
}

/* Tasti extra nella fotocamera */
#btn-undo { background: #5856d6; order: 3; display: none; }
#btn-finish { background: #007AFF; order: 0; display: none; }

/* Pillola R.S. sotto il tasto catalogo */
#rs-pill-container {
    position: absolute;
    top: 70px; /* Posizionata esattamente sotto il btn-side del catalogo */
    width: 60px; /* Stessa larghezza del pulsante sopra */
    height: 35px;
    background: #FFD60A; /* Giallo */
    border-radius: 12px;
    display: none; /* Nascosta di base */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1900;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.rs-circle {
    width: 22px;
    height: 22px;
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 900;
    color: black;
}

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">
    <div class="btn-side" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #d1d1d6; background: white;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
</a>

       <div class="btn-side" onclick="attivaCam()">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
    </svg>
</div>

<div class="btn-side" id="btn-gallery" onclick="document.getElementById('gallery-input').click()" style="overflow: hidden; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
</div>

<div class="btn-side" id="btn-crop" onclick="attivaRitaglio()" title="Ritaglio Manuale">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
    </svg>
</div>

     <div class="btn-side" onclick="modalitaRA()" id="btn-ra" title="Ritaglio Automatico">
    <svg width="34" height="34" viewBox="0 0 24 24" style="overflow: visible;">
        <circle cx="9" cy="12" r="7" fill="none" stroke="black" stroke-width="2" stroke-dasharray="3,2" />
        <text x="15" y="21" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">A.</text>
    </svg>
</div>

<div class="btn-side" onclick="modalitaCatalogo()" id="btn-catalog" title="Ritaglio Multiplo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="12" height="12" rx="2" stroke-dasharray="2,2"></rect>
        <rect x="3" y="3" width="12" height="12" rx="2" fill="white"></rect>
        <line x1="18" y1="15" x2="18" y2="21" stroke="#007AFF"></line>
        <line x1="15" y1="18" x2="21" y2="18" stroke="#007AFF"></line>
    </svg>
</div>

<div id="rs-pill-container">
        <div class="rs-circle">R.S.</div>
    </div>

        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

<div class="viewport" id="viewport">
    <img id="final-photo">
    <canvas id="crop-canvas"></canvas>
    <div id="grid-container"></div>
</div>




<div id="cam-overlay" class="full-screen-cam">
    <div id="ai-header">MODALITÀ : cosa è?</div>
    
    <div id="ai-label" onclick="toggleRecognition()">COSA È?</div>
    
    <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
    
    <video id="v" playsinline autoplay muted></video>
    <canvas id="preview-canvas" style="display:none;"></canvas>
    
    <div id="drawing-layer" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:3500; display:none; pointer-events: auto;">
        <svg id="clothing-shape" style="width:100%; height:100%;"></svg>
    </div>

    <div id="shutter" onclick="scatta()"></div>

  <div class="controls" id="ui">
    <button id="btn-finish" class="btn-ui" style="display:none; background: #007AFF;" onclick="concludiPunti()">FINE</button>
    <button class="btn-ui ok" onclick="accettaFoto()">OK</button> <button id="btn-undo" class="btn-ui" style="display:none; background: #5856d6;" onclick="rimuoviUltimoPunto()">ANNULLA</button>
    <button class="btn-ui retry" onclick="reset()">RETRY</button>
</div>


<script>
    // --- RIFERIMENTI DOM ---
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    // --- STATO APPLICAZIONE ---
    let modeRA = false;
    let modeCatalogo = false;
    let drawPoints = []; 
    let tipoCorrente = "Pantalone"; 
    let riconoscimentoAvvenuto = false;
    let targetCell = null;
    let isDrawing = false;
    let cropActive = false;
    let manualPoints = []; // Salva le coordinate dei tuoi tocchi
    let isManualMode = false; // Capisce se siamo in "Cosa è"


    // --- ETICHETTE ---
    const etichettePantaloni = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Vita", "Tasche Dietro", "Zip / Bottoni", "Tessuto Close-up", "Orlo Fondo", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];
    const etichetteMaglie = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Collo", "Logo / Ricamo", "Etichetta Lavaggio", "Tessuto Close-up", "Dettaglio Polsino", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];

    // --- GESTIONE IMMAGINE (GALLERIA) ---
    function caricaImmagine(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => { 
            // Se la griglia è aperta, la chiudiamo per vedere la foto
            if (modeCatalogo) modalitaCatalogo(); 
            
            finalImg.src = e.target.result; 
            finalImg.style.display = 'block'; // Rende visibile l'immagine nello spazio bianco
            
            aggiornaAnteprimaGalleria(e.target.result); 
        };
        reader.readAsDataURL(file);
    }

    function aggiornaAnteprimaGalleria(sorgente) {
        const btnGallery = document.getElementById('btn-gallery');
        btnGallery.innerHTML = `<img src="${sorgente}" style="width: 100%; height: 100%; object-fit: cover;">`;
    }

    // --- FOTOCAMERA ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            
            if (!targetCell) {
                tipoCorrente = "Nessun vestito";
                riconoscimentoAvvenuto = false;
            }

            overlay.style.display = 'block';
            v.style.display = 'block'; 
            sh.style.display = 'block'; 
            exitBtn.style.display = 'block';
            
            document.getElementById('ai-label').style.display = targetCell ? 'none' : 'block';
            document.getElementById('ai-label').innerText = "COSA È?";
            document.getElementById('ai-header').style.display = 'none';
            
            ui.style.display = 'none'; 
            canvas.style.display = 'none';
        } catch (e) { alert("Errore fotocamera: controlla i permessi."); }
    }

  function scatta() {
    canvas.width = v.videoWidth; 
    canvas.height = v.videoHeight;
    canvas.getContext('2d').drawImage(v, 0, 0);
    
    v.style.display = 'none'; 
    canvas.style.display = 'block';
    sh.style.display = 'none'; 
    exitBtn.style.display = 'none'; 
    ui.style.display = 'flex';

    const aiLabel = document.getElementById('ai-label');
    const buttons = document.querySelectorAll('.btn-ui');

    if(tipoCorrente !== "Nessun vestito") {
        // MODALITÀ COSA È
        isManualMode = true;
        document.getElementById('drawing-layer').style.display = 'block';
        aiLabel.style.display = 'block'; // Resta visibile
        
        // Trasforma i bottoni in pillole
        buttons.forEach(btn => btn.classList.add('pill'));
        attivaTouchPunti();
    } else {
        // MODALITÀ SEMPLICE
        isManualMode = false;
        aiLabel.style.display = 'none'; // Scompare dopo lo scatto
        
        // Mantieni bottoni circolari
        buttons.forEach(btn => btn.classList.remove('pill'));
    }
}


    function accettaFoto() {
        const dataUrl = canvas.toDataURL('image/png');
        
        if (targetCell) {
            targetCell.innerHTML = `<img src="${dataUrl}">`;
            targetCell.classList.add('filled');
            targetCell = null;
        } else if (riconoscimentoAvvenuto) {
            finalImg.style.display = 'none'; 
            if (!modeCatalogo) modalitaCatalogo(); 
            aggiornaNomiGriglia();
        } else {
            if (modeCatalogo) modalitaCatalogo();
            finalImg.src = dataUrl;
            finalImg.style.display = 'block';
        }

        aggiornaAnteprimaGalleria(dataUrl);
        chiudiCam();
    }

  function chiudiCam() {
    // 1. Spegne lo streaming video
    if (v.srcObject) {
        v.srcObject.getTracks().forEach(t => t.stop());
        v.srcObject = null;
    }
    
    // 2. Nasconde l'overlay
    overlay.style.display = 'none';

    // 3. RESET TOTALE (Foto semplice e Modalità Cosa è)
    manualPoints = []; // Cancella i punti messi
    if (document.getElementById('clothing-shape')) {
        document.getElementById('clothing-shape').innerHTML = ''; // Rimuove il disegno giallo
    }
    
    // Reset stati IA
    tipoCorrente = "Nessun vestito";
    riconoscimentoAvvenuto = false;
    isManualMode = false;
    
    const layer = document.getElementById('drawing-layer');
    if (layer) {
        layer.style.display = 'none';
        layer.classList.remove('allow-buttons');
        layer.querySelectorAll('.manual-dot').forEach(d => d.remove());
    }

    // Reset interfaccia
    ui.style.display = 'none';
    sh.style.display = 'none';
    document.getElementById('ai-header').style.display = 'none';
    document.getElementById('ai-label').style.display = 'none';
}


    function reset() {
        v.style.display = 'block'; 
        canvas.style.display = 'none';
        sh.style.display = 'block'; 
        ui.style.display = 'none'; 
        exitBtn.style.display = 'block';
    }

    // --- CATALOGO E GRIGLIA ---
    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.setAttribute('data-label', etichettePantaloni[i]); 
            cell.onclick = () => { targetCell = cell; attivaCam(); };
            container.appendChild(cell);
        }
    }
    creaGriglia();

   function modalitaCatalogo() {
    modeCatalogo = !modeCatalogo;
    const btn = document.getElementById('btn-catalog');
    const grid = document.getElementById('grid-container');
    const rsPill = document.getElementById('rs-pill-container');
    
    if (modeCatalogo) {
        // --- ATTIVAZIONE ---
        btn.style.background = '#007AFF';
        btn.querySelectorAll('rect, line').forEach(el => el.setAttribute('stroke', 'white'));
        grid.style.display = 'grid';
        finalImg.style.display = 'none';
        
        // Mostra la pillola gialla R.S.
        if (rsPill) rsPill.style.display = 'flex';
        
    } else {
        // --- DISATTIVAZIONE ---
        btn.style.background = 'white';
        btn.querySelectorAll('rect').forEach(el => el.setAttribute('stroke', 'black'));
        btn.querySelector('line').setAttribute('stroke', '#007AFF');
        grid.style.display = 'none';
        
        // Nasconde la pillola gialla R.S.
        if (rsPill) rsPill.style.display = 'none';

        // RESET DELLE FOTO SOLLEVATE (Pila di drag)
        if (dragContainer) {
            dragContainer.remove();
            dragContainer = null;
        }
        isDraggingAll = false;

        if(finalImg.src) finalImg.style.display = 'block';
    }
}

   function aggiornaNomiGriglia(puntiRilevati) {
    const cells = document.querySelectorAll('.grid-cell');
    let labels = [];

    if (puntiRilevati >= 12) {
        // Modalità Maglia (10 + 2 extra)
        labels = [...etichetteMaglie.slice(0, 10), "EXTRA 1", "EXTRA 2"];
        tipoCorrente = "Maglia";
    } else {
        // Modalità Pantalone (8 + 2 extra + 2 vuoti/oggetto)
        labels = [...etichettePantaloni.slice(0, 8), "EXTRA 1", "EXTRA 2", "OGGETTO", "OGGETTO"];
        tipoCorrente = "Pantalone";
    }

    cells.forEach((cell, i) => {
        if (!cell.classList.contains('filled')) {
            cell.setAttribute('data-label', labels[i]);
        }
    });
}


// --- INTELLIGENZA ARTIFICIALE (SISTEMA MANUALE PUNTI) ---

let cooldownTimer;

// Riconoscimento semplificato: solo ON/OFF con testi fissi
function toggleRecognition() {
    const aiLabel = document.getElementById('ai-label');
    const aiHeader = document.getElementById('ai-header');

    if (tipoCorrente === "Nessun vestito") {
        tipoCorrente = "Attivo"; // Stato generico
        aiHeader.style.display = 'block';
        aiHeader.innerText = "MODALITÀ : COSA È?"; 
        aiHeader.style.color = "white";
        aiLabel.innerText = "COSA È?"; 
        riconoscimentoAvvenuto = true;
    } else {
        tipoCorrente = "Nessun vestito";
        aiHeader.style.display = 'none';
        aiLabel.innerText = "COSA È?";
        riconoscimentoAvvenuto = false;
    }
}

// Gestione tocchi con sblocco più lento (2.5s)
function attivaTouchPunti() {
    const layer = document.getElementById('drawing-layer');
    layer.onclick = function(e) {
        if (!isManualMode) return;
        
        const rect = layer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        manualPoints.push({x, y});
        disegnaPunti();

        layer.classList.remove('allow-buttons');
        clearTimeout(cooldownTimer);
        
        cooldownTimer = setTimeout(() => {
            layer.classList.add('allow-buttons');
        }, 2500); // Portato a 2.5 secondi
    };
}

function disegnaPunti() {
    const layer = document.getElementById('drawing-layer');
    const svg = document.getElementById('clothing-shape');
    
    layer.querySelectorAll('.manual-dot').forEach(d => d.remove());
    
    // Mostra UNDO e FINE solo se necessari
    document.getElementById('btn-undo').style.display = manualPoints.length > 0 ? 'flex' : 'none';
    document.getElementById('btn-finish').style.display = manualPoints.length >= 3 ? 'flex' : 'none';

    let polyPoints = manualPoints.map(p => `${p.x},${p.y}`).join(" ");

    if (manualPoints.length > 2) {
        svg.innerHTML = `<polygon points="${polyPoints}" style="fill:rgba(255, 214, 10, 0.3); stroke:#FFD60A; stroke-width:3" />`;
    } else if (manualPoints.length > 1) {
        svg.innerHTML = `<polyline points="${polyPoints}" style="fill:none; stroke:#FFD60A; stroke-width:3" />`;
    } else {
        svg.innerHTML = '';
    }

    manualPoints.forEach((p) => {
        const dot = document.createElement('div');
        dot.className = 'manual-dot';
        dot.style.left = p.x + 'px';
        dot.style.top = p.y + 'px';
        layer.appendChild(dot);
    });
}

function rimuoviUltimoPunto() {
    manualPoints.pop();
    disegnaPunti();
    
    // Riabilita immediatamente il layer per mettere nuovi punti
    const layer = document.getElementById('drawing-layer');
    layer.classList.remove('allow-buttons');
    isManualMode = true; 
}

function concludiPunti() {
    const svg = document.getElementById('clothing-shape');
    const layer = document.getElementById('drawing-layer');
    
    let polyPoints = manualPoints.map(p => `${p.x},${p.y}`).join(" ");
    svg.innerHTML = `<polygon points="${polyPoints}" style="fill:rgba(255, 214, 10, 0.6); stroke:#FFD60A; stroke-width:4" />`;

    // Nasconde i tasti di editing
    document.getElementById('btn-finish').style.display = 'none';
    document.getElementById('btn-undo').style.display = 'none';
    isManualMode = false; 
    
    // Sblocca definitivamente i click per i pulsanti OK/Retry
    layer.classList.add('allow-buttons');
}

function reset() {
    v.style.display = 'block'; 
    canvas.style.display = 'none';
    sh.style.display = 'block'; 
    ui.style.display = 'none'; 
    exitBtn.style.display = 'block';
    
    // Pulizia totale punti e sblocco layer
    manualPoints = [];
    document.getElementById('clothing-shape').innerHTML = '';
    const layer = document.getElementById('drawing-layer');
    layer.style.display = 'none';
    layer.classList.remove('allow-buttons');
}


let isDraggingAll = false;
let dragContainer = null;
let pressTimer;

function setupMultiDrag() {
    const cells = document.querySelectorAll('.grid-cell');
    
    cells.forEach(cell => {
        cell.onpointerdown = (e) => {
            pressTimer = setTimeout(() => startMultiDrag(e), 800);
        };
        cell.onpointerup = () => clearTimeout(pressTimer);
    });
}

function startMultiDrag(e) {
    const filledCells = document.querySelectorAll('.grid-cell.filled img');
    if (filledCells.length === 0) return;

    isDraggingAll = true;
    dragContainer = document.createElement('div');
    dragContainer.className = 'multi-sticker';
    dragContainer.style.width = '100px'; 
    dragContainer.style.height = '120px';

    // Crea la pila di foto
    filledCells.forEach((img, index) => {
        const copy = img.cloneNode();
        copy.className = 'stacked-photo';
        copy.style.transform = `translate(${index * 3}px, ${-index * 3}px)`;
        copy.style.zIndex = 100 - index;
        dragContainer.appendChild(copy);
    });

    document.body.appendChild(dragContainer);
    moveDrag(e);
}

document.onpointermove = (e) => {
    if (isDraggingAll && dragContainer) moveDrag(e);
};

function moveDrag(e) {
    dragContainer.style.left = (e.clientX - 50) + 'px';
    dragContainer.style.top = (e.clientY - 60) + 'px';
}

document.onpointerup = (e) => {
    if (isDraggingAll) {
        const galleryBtn = document.getElementById('btn-gallery').getBoundingClientRect();
        
        // Verifica se rilasciato sopra il tasto galleria
        if (e.clientX > galleryBtn.left && e.clientX < galleryBtn.right &&
            e.clientY > galleryBtn.top && e.clientY < galleryBtn.bottom) {
            alert("Foto salvate nella galleria del dispositivo!");
        }
        
        dragContainer.remove();
        dragContainer = null;
        isDraggingAll = false;
    }
};

// Avvia il setup al caricamento
creaGriglia();
setupMultiDrag();
