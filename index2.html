<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .controls { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 25px; z-index: 3100; 
        }

        .btn-ui { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 28px; 
            color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ok { background: #34c759; order: 1; }
        .retry { background: #ff3b30; order: 2; }

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

       /* Stile per il tasto ritaglio quando è attivo */
.btn-side.active {
    background: #d1d1d6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    border-color: #a1a1a6;
}


/* Sticker che si solleva e viene trascinato */
.sticker {
    position: absolute;
    z-index: 5000;
    cursor: grab;
    pointer-events: auto;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
}

.sticker.dragging {
    transition: none; /* Fluido durante il trascinamento */
    cursor: grabbing;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* Griglia Catalogo Aggiornata */
#grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 1px;
    padding: 2px;
    background: #e5e5ea;
    z-index: 100;
   padding-bottom: env(safe-area-inset-bottom, 20px); /* Usa lo spazio di sistema se presente */
    box-sizing: border-box;
}

.grid-cell {
    background: white;
    display: flex;
    flex-direction: column; /* Per mettere testo sotto il simbolo */
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

/* Il "+" sottile e nero */
.grid-cell::before {
    content: '+';
    font-size: 20px;
    font-weight: 200; /* Più sottile */
    color: #000;      /* Nero */
    margin-bottom: 4px;
}

/* Etichette per i pantaloni */
.grid-cell::after {
    content: attr(data-label); /* Prende il testo dal JS */
    font-size: 10px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.grid-cell.filled::before, 
.grid-cell.filled::after { display: none; }

.grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 2. Classe per l'animazione di raccolta verso il tasto galleria */
.flying-photo {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
}

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">

     <div class="btn-side" onclick="modalitaRA()" id="btn-ra" title="Ritaglio Automatico">
    <svg width="34" height="34" viewBox="0 0 24 24" style="overflow: visible;">
        <circle cx="9" cy="12" r="7" fill="none" stroke="black" stroke-width="2" stroke-dasharray="3,2" />

</div>

<div class="btn-side" onclick="modalitaCatalogo()" id="btn-catalog" title="Ritaglio Multiplo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="12" height="12" rx="2" stroke-dasharray="2,2"></rect>

        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

<div class="viewport" id="viewport">
    <img id="final-photo">
    
    <canvas id="crop-canvas"></canvas>
    
    <div id="grid-container"></div>
</div>


        
        <img id="final-photo">
        <canvas id="crop-canvas"></canvas>
    </div>



    <div id="cam-overlay" class="full-screen-cam">
        <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
        <video id="v" playsinline autoplay muted></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div id="shutter" onclick="scatta()"></div>
        <div class="controls" id="ui">
            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>

</div>

<script>
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');

    let modeRA = false;
    let longPressTimer;
    let drawPoints = []; // Memorizza le coordinate del ritaglio
    let activeSticker = null;


    // --- LOGICA R.A. AGGIORNATA ---
    function modalitaRA() {
        if (finalImg.style.display === 'none' || finalImg.src === "") {
            alert("Scatta o carica una foto prima!");
            return;
        }
        modeRA = !modeRA;
        
        const btn = document.getElementById('btn-ra');
        const circles = btn.querySelectorAll('circle');
        const texts = btn.querySelectorAll('text');

        if (modeRA) {
            // Stato Attivo: Blu con icone bianche
            btn.style.background = '#007AFF';
            circles.forEach(c => c.setAttribute('stroke', 'white'));
            texts.forEach(t => t.setAttribute('fill', 'white'));
        } else {
            // Stato Inattivo: Bianco con icone nere
            btn.style.background = 'white';
            circles.forEach(c => c.setAttribute('stroke', 'black'));
            texts.forEach(t => t.setAttribute('fill', 'black'));
        }
    }


function eseguiRitaglioAutomatico(e) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    const w = finalImg.naturalWidth;
    const h = finalImg.naturalHeight;
    tempCanvas.width = w;
    tempCanvas.height = h;

    tempCtx.drawImage(finalImg, 0, 0, w, h);
    const imageData = tempCtx.getImageData(0, 0, w, h);
    const pixels = imageData.data;

    // Logica rimozione sfondo (Soglia luminosità)
    for (let i = 0; i < pixels.length; i += 4) {
        const brightness = (pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3;
        if (brightness > 200) pixels[i + 3] = 0;
    }
    tempCtx.putImageData(imageData, 0, 0);

    // Creazione dello Sticker
    const sticker = document.createElement('img');
    sticker.src = tempCanvas.toDataURL('image/png');
    sticker.className = 'sticker';
    
    // Posizionamento iniziale perfetto sopra l'immagine
    const rect = finalImg.getBoundingClientRect();
    sticker.style.width = rect.width + 'px';
    sticker.style.height = rect.height + 'px';
    sticker.style.left = rect.left + 'px';
    sticker.style.top = rect.top + 'px';

    document.getElementById('viewport').appendChild(sticker);

    // Animazione sollevamento
    setTimeout(() => {
        sticker.style.transform = "scale(1.05) translateY(-10px)";
    }, 10);

    initDraggableSticker(sticker);

    // Reset interfaccia
    finalImg.classList.remove('ai-active');
    modeRA = false;
    document.getElementById('btn-ra').style.background = 'white';
    const svgEls = document.getElementById('btn-ra').querySelectorAll('circle, text');
    svgEls.forEach(el => el.setAttribute(el.tagName === 'circle' ? 'stroke' : 'fill', 'black'));
}

function initDraggableSticker(el) {
    let offsetX, offsetY;

    const start = (e) => {
        const touch = e.touches ? e.touches[0] : e;
        offsetX = touch.clientX - el.offsetLeft;
        offsetY = touch.clientY - el.offsetTop;
        el.classList.add('dragging');
    };

    const move = (e) => {
        if (!el.classList.contains('dragging')) return;
        e.preventDefault();
        const touch = e.touches ? e.touches[0] : e;
        el.style.left = (touch.clientX - offsetX) + 'px';
        el.style.top = (touch.clientY - offsetY) + 'px';
    };

    const stop = () => {
        el.classList.remove('dragging');
    };

    el.onmousedown = start;
    window.onmousemove = move;
    window.onmouseup = stop;

    el.ontouchstart = start;
    el.ontouchmove = move;
    el.ontouchend = stop;
}




    // --- FUNZIONI CAM E GALLERIA (Invariate) ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            overlay.style.display = 'block';
            v.style.display = 'block'; sh.style.display = 'block'; exitBtn.style.display = 'block';
            ui.style.display = 'none'; canvas.style.display = 'none';
        } catch (e) { alert("Accesso negato."); }
    }

    function scatta() {
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        v.style.display = 'none'; canvas.style.display = 'block';
        sh.style.display = 'none'; exitBtn.style.display = 'none'; ui.style.display = 'flex';
    }

    function reset() {
        v.style.display = 'block'; canvas.style.display = 'none';
        sh.style.display = 'block'; ui.style.display = 'none'; exitBtn.style.display = 'block';
    }

function accettaFoto() {
    const dataUrl = canvas.toDataURL('image/png');
    
    // Se siamo in modalità catalogo e abbiamo selezionato un quadratino
    if (modeCatalogo && targetCell) {
        targetCell.innerHTML = `<img src="${dataUrl}">`;
        targetCell.classList.add('filled');
        targetCell = null; // Resetta il target per il prossimo scatto
    } else {
        // Comportamento standard (Foto singola)
        finalImg.src = dataUrl;
        finalImg.style.display = 'block';
        aggiornaAnteprimaGalleria(dataUrl);
    }
    chiudiCam();
}


    function chiudiCam() {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        overlay.style.display = 'none';
    }

   function caricaImmagine(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { 
        finalImg.src = e.target.result; 
        finalImg.style.display = 'block'; 
        aggiornaAnteprimaGalleria(e.target.result); // Aggiorna il quadratino
    };
    reader.readAsDataURL(file);
}


   let isDrawing = false;
let cropActive = false;

function attivaRitaglio() {
    if (finalImg.style.display === 'none' || finalImg.style.display === '') return;

    cropActive = !cropActive;
    const btn = document.getElementById('btn-crop');
    
    if (cropActive) {
        btn.classList.add('active');
        
        // --- ALTA DEFINIZIONE ---
        const dpr = window.devicePixelRatio || 1;
        const rect = viewport.getBoundingClientRect();
        cropCanvas.width = rect.width * dpr;
        cropCanvas.height = rect.height * dpr;
        cropCanvas.style.width = rect.width + "px";
        cropCanvas.style.height = rect.height + "px";
        ctxCrop.scale(dpr, dpr);
        // ------------------------

        cropCanvas.style.display = 'block';
        initDrawing();
    } else {
        btn.classList.remove('active');
        cropCanvas.style.display = 'none';
        ctxCrop.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
    }
}

function initDrawing() {
    // Configurazione stile linea: TRATTEGGIATA
    ctxCrop.strokeStyle = "white"; // Colore contrastante sulla foto
    ctxCrop.lineWidth = 3;
    ctxCrop.setLineDash([10, 10]); // Tratteggio: 10px linea, 10px spazio
    ctxCrop.lineCap = "round";

    const start = (e) => {
        isDrawing = true;
        drawPoints = []; // Resetta i punti
        ctxCrop.beginPath();
        const rect = cropCanvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        ctxCrop.moveTo(x, y);
        drawPoints.push({x, y});
    };

    const move = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const rect = cropCanvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        ctxCrop.lineTo(x, y);
        ctxCrop.stroke();
        drawPoints.push({x, y}); // Salva il punto
    };

       const stop = () => {
        if (!isDrawing) return;
        isDrawing = false;
        ctxCrop.closePath(); // Chiude la forma
        
        // Simula l'effetto "Apple Intelligence" prima del taglio
        finalImg.classList.add('ai-active');
        
        setTimeout(() => {
            eseguiTaglioManuale();
            finalImg.classList.remove('ai-active');
            attivaRitaglio(); // Disattiva lo strumento dopo il taglio
        }, 600);
    };


    cropCanvas.onmousedown = start;
    cropCanvas.onmousemove = move;
    window.onmouseup = stop;

    cropCanvas.ontouchstart = start;
    cropCanvas.ontouchmove = move;
    cropCanvas.ontouchend = stop;
}


function aggiornaAnteprimaGalleria(sorgente) {
    const btnGallery = document.getElementById('btn-gallery');
    // Inserisce l'immagine scattata/caricata dentro il quadratino al posto dell'SVG
    btnGallery.innerHTML = `<img src="${sorgente}" style="width: 100%; height: 100%; object-fit: cover;">`;
}


function eseguiTaglioManuale() {
    if (drawPoints.length < 3) return;

    const tempCanvas = document.createElement('canvas');
    const tCtx = tempCanvas.getContext('2d');
    
    tempCanvas.width = finalImg.naturalWidth;
    tempCanvas.height = finalImg.naturalHeight;

    // Rapporto tra dimensione reale immagine e dimensione visualizzata a schermo
    const scaleX = tempCanvas.width / cropCanvas.offsetWidth;
    const scaleY = tempCanvas.height / cropCanvas.offsetHeight;

    // 1. Creiamo la maschera basata sui punti disegnati
    tCtx.beginPath();
    tCtx.moveTo(drawPoints[0].x * scaleX, drawPoints[0].y * scaleY);
    for (let i = 1; i < drawPoints.length; i++) {
        tCtx.lineTo(drawPoints[i].x * scaleX, drawPoints[i].y * scaleY);
    }
    tCtx.closePath();

    // 2. Ritagliamo l'immagine
    tCtx.clip(); 
    tCtx.drawImage(finalImg, 0, 0, tempCanvas.width, tempCanvas.height);
    
    // 3. Applichiamo lo sfondo bianco (opzionale, se vuoi trasparenza rimuovi le righe sotto)
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = tempCanvas.width;
    finalCanvas.height = tempCanvas.height;
    const fCtx = finalCanvas.getContext('2d');
    fCtx.fillStyle = "white"; // Sfondo bianco
    fCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
    fCtx.drawImage(tempCanvas, 0, 0);

    // Aggiorna l'immagine visualizzata
    finalImg.src = finalCanvas.toDataURL('image/png');
    
    // Feedback Apple Style
    finalImg.style.transform = "scale(1.05)";
    setTimeout(() => finalImg.style.transform = "scale(1)", 300);
}

    let modeCatalogo = false;
    let targetCell = null;

   // Nomi suggeriti per vendere pantaloni (10 + 2 personalizzati)
const etichettePantaloni = [
    "Fronte", "Retro", "Etichetta Taglia", 
    "Dettaglio Vita", "Tasche Dietro", "Zip / Bottoni", 
    "Tessuto Close-up", "Orlo Fondo", "Indossato", 
    "Misure Metro", "Extra 1", "Extra 2"
];

function creaGriglia() {
    const container = document.getElementById('grid-container');
    container.innerHTML = '';
    for (let i = 0; i < 12; i++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        // Assegna l'etichetta dall'array
        cell.setAttribute('data-label', etichettePantaloni[i]); 
        cell.onclick = () => scattaPerGriglia(cell);
        container.appendChild(cell);
    }
}

    // Esegui subito la creazione
    creaGriglia();

    function modalitaCatalogo() {
        modeCatalogo = !modeCatalogo;
        const btn = document.getElementById('btn-catalog');
        const grid = document.getElementById('grid-container');
        
        if (modeCatalogo) {
            // Stato Attivo: Blu e mostra griglia
            btn.style.background = '#007AFF';
            btn.querySelectorAll('rect, line').forEach(el => el.setAttribute('stroke', 'white'));
            grid.style.display = 'grid';
            finalImg.style.display = 'none';
        } else {
            // Stato Inattivo: Bianco e nasconde griglia
            btn.style.background = 'white';
            btn.querySelectorAll('rect').forEach(el => el.setAttribute('stroke', 'black'));
            btn.querySelector('line').setAttribute('stroke', '#007AFF');
            grid.style.display = 'none';
            if(finalImg.src) finalImg.style.display = 'block';
        }
    }

    function scattaPerGriglia(cell) {
        targetCell = cell;
        attivaCam();
    }

// Aggiungi questa funzione per animare le foto verso la galleria
function raccogliFoto() {
    const cells = document.querySelectorAll('.grid-cell.filled');
    const galleryBtn = document.getElementById('btn-gallery');
    const rectDest = galleryBtn.getBoundingClientRect();

    if (cells.length === 0) return;

    cells.forEach((cell, index) => {
        const img = cell.querySelector('img');
        const rectStart = img.getBoundingClientRect();

        // Crea un clone visivo per l'animazione
        const clone = document.createElement('img');
        clone.src = img.src;
        clone.className = 'flying-photo';
        clone.style.width = rectStart.width + 'px';
        clone.style.height = rectStart.height + 'px';
        clone.style.top = rectStart.top + 'px';
        clone.style.left = rectStart.left + 'px';
        
        document.body.appendChild(clone);

        // Effetto "Sollevamento" e poi spostamento
        setTimeout(() => {
            clone.style.transform = "scale(1.2) rotate(5deg)";
            
            setTimeout(() => {
                clone.style.width = "40px";
                clone.style.height = "40px";
                clone.style.top = (rectDest.top + 10) + 'px';
                clone.style.left = (rectDest.left + 10) + 'px';
                clone.style.opacity = "0.5";
                clone.style.transform = "scale(0.2) rotate(20deg)";
            }, 100 + (index * 50)); // Delay progressivo per l'effetto "sciame"
        }, 10);

        // Rimuovi il clone e pulisci la cella alla fine
        setTimeout(() => {
            clone.remove();
            // Opzionale: pulisce la griglia dopo il salvataggio
            // cell.innerHTML = '';
            // cell.classList.remove('filled');
            
            // Aggiorna l'anteprima galleria con l'ultima foto raccolta
            if (index === cells.length - 1) {
                aggiornaAnteprimaGalleria(img.src);
                alert("Foto salvate nella sessione!");
            }
        }, 900 + (cells.length * 50));
    });
}
