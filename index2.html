<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        /* Sidebar laterale */
        .sidebar { 
            width: 80px; 
            background: #f2f2f7; 
            border-right: 1px solid #d1d1d6; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
            gap: 20px;
        }

        .btn-cam { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Area Principale - Qui compare la foto accettata */
        .viewport { 
            flex: 1; 
            background: white; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        /* Immagine finale adattata nello spazio bianco */
        #final-photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        /* Modal Fotocamera tutto schermo */
        .full-screen-cam {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1000;
            background: #000;
            display: none;
        }
        
        video, #preview-canvas { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; top: 0; left: 0;
        }

        /* Controlli Verticali a Destra (↺ e ✓) */
        .controls { 
            position: absolute; 
            right: 25px; /* Stessa distanza dello shutter */
            top: 50%;
            transform: translateY(-50%);
            display: none; 
            flex-direction: column; /* Verticali */
            gap: 30px; 
            z-index: 1100; 
        }

        .btn-ui { 
            width: 70px; /* Leggermente più piccoli dello scatto */
            height: 70px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .retry { background: #ff3b30; } 
        .ok { background: #34c759; }

        /* Pulsante di scatto a destra centrato Y */
        #shutter { 
            position: absolute; 
            right: 20px; 
            top: 50%; 
            transform: translateY(-50%);
            width: 85px; height: 85px; 
            border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2);
            display: none; z-index: 1050; cursor: pointer;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px;
            width: 40px; height: 40px; display: none;
            background: none; border: none; z-index: 1100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">
        <div class="btn-cam" onclick="attivaCam()">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </div>
        <div class="btn-cam">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
        </div>
    </div>

    <div class="viewport">
        <img id="final-photo" alt="Scatto accettato">
    </div>

    <div id="cam-overlay" class="full-screen-cam">
        <button id="exit-cam" onclick="chiudiCam()">
            <span></span><span></span>
        </button>
        <video id="v" playsinline autoplay muted></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div id="shutter" onclick="scatta()"></div>
        <div class="controls" id="ui">
            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');

    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            v.srcObject = stream;
            overlay.style.display = 'block';
            v.style.display = 'block';
            sh.style.display = 'block';
            exitBtn.style.display = 'block';
            ui.style.display = 'none';
            canvas.style.display = 'none';
        } catch (e) { alert("Permessi fotocamera negati."); }
    }

    function scatta() {
        canvas.width = v.videoWidth;
        canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        v.style.display = 'none';
        canvas.style.display = 'block';
        sh.style.display = 'none';
        exitBtn.style.display = 'none';
        ui.style.display = 'flex'; // Mostra ✓ e ↺ in verticale
    }

    function reset() {
        v.style.display = 'block';
        canvas.style.display = 'none';
        sh.style.display = 'block';
        ui.style.display = 'none';
        exitBtn.style.display = 'block';
    }

    function accettaFoto() {
        // Prende l'immagine dal canvas e la mette nel riquadro bianco
        const dataURL = canvas.toDataURL('image/png');
        finalImg.src = dataURL;
        finalImg.style.display = 'block';
        chiudiCam();
    }

    function chiudiCam() {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        overlay.style.display = 'none';
    }
</script>

</body>
</html>
