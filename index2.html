<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinny Cam UI - R.A. Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: white; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 80px; background: #f2f2f7; border-right: 1px solid #d1d1d6; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 2000; gap: 15px;
        }

        .btn-side { 
            width: 60px; height: 60px; background: white; border-radius: 15px; 
            border: 1px solid #c6c6c8; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-weight: bold; font-size: 14px; color: #007AFF;
        }

        .viewport { flex: 1; background: white; position: relative; overflow: hidden; }

        #final-photo { 
            width: 100%; height: 100%; object-fit: cover; display: none; 
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        /* Effetto Apple Intelligence (Contorno luminoso) */
        .ai-active {
            filter: drop-shadow(0 0 15px #fff) drop-shadow(0 0 30px #007AFF);
            transform: scale(0.98);
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Overlay Fotocamera */
        .full-screen-cam {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3000; background: #000; display: none;
        }
        
        video, #preview-canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .controls { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: none; flex-direction: column; gap: 25px; z-index: 3100; 
        }

        .btn-ui { 
            width: 65px; height: 65px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 28px; 
            color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .ok { background: #34c759; order: 1; }
        .retry { background: #ff3b30; order: 2; }

        #shutter { 
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 85px; height: 85px; border-radius: 50%; border: 6px solid white; 
            background: rgba(255,255,255,0.2); display: none; z-index: 3050;
        }

        #exit-cam {
            position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; 
            display: none; background: none; border: none; z-index: 3100;
        }
        #exit-cam span { position: absolute; width: 30px; height: 3px; background-color: white; border-radius: 2px; }
        #exit-cam span:nth-child(1) { transform: rotate(45deg); }
        #exit-cam span:nth-child(2) { transform: rotate(-45deg); }

        #gallery-input { display: none; }
      

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d1d1d6;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

       /* Stile per il tasto ritaglio quando è attivo */
.btn-side.active {
    background: #d1d1d6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    border-color: #a1a1a6;
}


/* Sticker che si solleva e viene trascinato */
.sticker {
    position: absolute;
    z-index: 5000;
    cursor: grab;
    pointer-events: auto;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.2s ease;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
}

.sticker.dragging {
    transition: none; /* Fluido durante il trascinamento */
    cursor: grabbing;
    transform: scale(1.1);
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
}

/* Griglia uniforme: asse X ampio, asse Y compatto */
#grid-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 95%;
    display: none;
    
    /* Layout a griglia 3x4 */
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    
    /* Gap differenziato: 8px tra le colonne (X), 4px tra le righe (Y) */
    gap: 4px 8px; 
    
    /* Padding bilanciato: 
       Top: 10px (per non toccare il bordo alto)
       Right: 10px 
       Bottom: 40px (per lasciare spazio sicuro in basso)
       Left: 10px (distanza minima dalla sidebar) 
    */
    padding: 10px 10px 40px 10px; 
    
    background: #f2f2f7; 
    z-index: 100;
    box-sizing: border-box;
    
    /* Spostamento leggero verso l'alto per compensare la barra dell'iPad/Browser */
    transform: translateY( 0px);
}

.grid-cell {
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    border: 1px solid #d1d1d6;
    
    /* Rimosso lo scale per occupare tutto lo spazio disponibile in modo uniforme */
    width: 100%;
    height: 100%;
}

/* Effetto al tocco */
.grid-cell:active {
    transform: scale(0.92);
    background: #e5e5ea;
}

/* Il "+" sottile e nero */
.grid-cell::before {
    content: '+';
    font-size: 20px;
    font-weight: 200; /* Più sottile */
    color: #000;      /* Nero */
    margin-bottom: 4px;
}

/* Etichette per i pantaloni */
.grid-cell::after {
    content: attr(data-label); /* Prende il testo dal JS */
    font-size: 10px;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.grid-cell.filled::before, 
.grid-cell.filled::after { display: none; }

.grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 2. Classe per l'animazione di raccolta verso il tasto galleria */
.flying-photo {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
}

/* Etichetta gialla sotto lo shutter */
#ai-label {
    position: absolute;
    right: 20px;
    top: calc(50% + 60px); /* Sotto il cerchio shutter */
    transform: translateY(-50%);
    background: #FFD60A;
    color: black;
    padding: 5px 12px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
    z-index: 3200;
    display: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Titolo riconoscimento in alto */
#ai-header {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 18px;
    font-weight: bold;
    z-index: 3100;
    display: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.scan-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #FFD60A;
    border-radius: 50%;
    z-index: 3500;
    box-shadow: 0 0 10px #FFD60A, 0 0 20px rgba(255, 214, 10, 0.5);
    border: 1px solid white;
    pointer-events: none;
    transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); /* Transizione fluida per lo spostamento */
}

/* Il mirino centrale */
#ar-reticle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    border: 2px solid white;
    border-radius: 50%;
    z-index: 4000;
    display: none;
    pointer-events: none;
}
#ar-reticle::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px; background: #FFD60A; border-radius: 50%;
    transform: translate(-50%, -50%);
}

/* Tasto conferma punto (a destra) */
#btn-confirm-point {
    position: absolute;
    right: 30px; top: 50%;
    transform: translateY(-50%);
    width: 70px; height: 70px;
    background: #007AFF;
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    color: white; font-weight: bold; font-size: 20px;
    z-index: 4100; border: 3px solid white;
}

/* Tasto Fine (sotto lo shutter) */
#btn-finish-ar {
    position: absolute;
    right: 20px; top: calc(50% + 140px);
    background: #34c759; color: white;
    padding: 10px 20px; border-radius: 20px;
    font-weight: bold; display: none; z-index: 4100;
}

#ai-canvas {
    filter: drop-shadow(0 0 5px #FFD60A);
}
    </style>
</head>
<body>

<div id="app">
    <div class="sidebar">

<a href="index.html" style="text-decoration: none; position: absolute; top: 15px;">
    <div class="btn-side" style="width: 45px; height: 45px; border-radius: 50%; border: 1px solid #d1d1d6; background: white;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </div>
</a>

       <div class="btn-side" onclick="attivaCam()">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
    </svg>
</div>

<div class="btn-side" id="btn-gallery" onclick="document.getElementById('gallery-input').click()" style="overflow: hidden; padding: 0;">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
    </svg>
</div>

<div class="btn-side" id="btn-crop" onclick="attivaRitaglio()" title="Ritaglio Manuale">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="6" cy="6" r="3"></circle>
        <circle cx="6" cy="18" r="3"></circle>
        <line x1="20" y1="4" x2="8.12" y2="15.88"></line>
        <line x1="14.47" y1="14.48" x2="20" y2="20"></line>
        <line x1="8.12" y1="8.12" x2="12" y2="12"></line>
    </svg>
</div>

     <div class="btn-side" onclick="modalitaRA()" id="btn-ra" title="Ritaglio Automatico">
    <svg width="34" height="34" viewBox="0 0 24 24" style="overflow: visible;">
        <circle cx="9" cy="12" r="7" fill="none" stroke="black" stroke-width="2" stroke-dasharray="3,2" />
        <text x="15" y="21" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="black">A.</text>
    </svg>
</div>

<div class="btn-side" onclick="modalitaCatalogo()" id="btn-catalog" title="Ritaglio Multiplo">
    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="12" height="12" rx="2" stroke-dasharray="2,2"></rect>
        <rect x="3" y="3" width="12" height="12" rx="2" fill="white"></rect>
        <line x1="18" y1="15" x2="18" y2="21" stroke="#007AFF"></line>
        <line x1="15" y1="18" x2="21" y2="18" stroke="#007AFF"></line>
    </svg>
</div>


        <input type="file" id="gallery-input" accept="image/*" onchange="caricaImmagine(event)">
    </div>

<div class="viewport" id="viewport">
    <img id="final-photo">
    <canvas id="crop-canvas"></canvas>
    <div id="grid-container"></div>
</div>


<canvas id="ai-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3040; pointer-events: none;"></canvas>


    <div id="cam-overlay" class="full-screen-cam">
      <div id="ar-reticle"></div>
<div id="btn-confirm-point" onclick="addARPoint()">OK</div>
<div id="btn-finish-ar" onclick="finishARMapping()">FINE</div>

      <div id="ai-header">RICONOSCIMENTO...</div>
<div id="ai-label" onclick="toggleRecognition()">COSA È?</div>
        <button id="exit-cam" onclick="chiudiCam()"><span></span><span></span></button>
        <video id="v" playsinline autoplay muted></video>
        <canvas id="preview-canvas" style="display:none;"></canvas>
        <div id="shutter" onclick="scatta()"></div>
        <div class="controls" id="ui">
            <button class="btn-ui ok" onclick="accettaFoto()">✓</button>
            <button class="btn-ui retry" onclick="reset()">↺</button>
        </div>
    </div>
</div>

<script>
    // --- RIFERIMENTI DOM ---
    const v = document.getElementById('v');
    const canvas = document.getElementById('preview-canvas');
    const ui = document.getElementById('ui');
    const sh = document.getElementById('shutter');
    const overlay = document.getElementById('cam-overlay');
    const exitBtn = document.getElementById('exit-cam');
    const finalImg = document.getElementById('final-photo');
    const cropCanvas = document.getElementById('crop-canvas');
    const ctxCrop = cropCanvas.getContext('2d');
    
    const arCanvas = document.getElementById('ai-canvas');
    const arReticle = document.getElementById('ar-reticle');
    const btnConfirm = document.getElementById('btn-confirm-point');
    const btnFinish = document.getElementById('btn-finish-ar');
    const aiLabel = document.getElementById('ai-label');
    const aiHeader = document.getElementById('ai-header');

    // --- STATO APPLICAZIONE ---
    let modeCatalogo = false;
    let tipoCorrente = "Nessun vestito"; 
    let riconoscimentoAvvenuto = false;
    let targetCell = null;
    
    // Stato AR
    let arPoints = [];
    let isMapping = false;

    // --- ETICHETTE ---
    const etichettePantaloni = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Vita", "Tasche Dietro", "Zip / Bottoni", "Tessuto Close-up", "Orlo Fondo", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];
    const etichetteMaglie = ["Fronte", "Retro", "Etichetta Taglia", "Dettaglio Collo", "Logo / Ricamo", "Etichetta Lavaggio", "Tessuto Close-up", "Dettaglio Polsino", "Indossato", "Misure Metro", "Extra 1", "Extra 2"];

    // --- FOTOCAMERA ---
    async function attivaCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
            });
            v.srcObject = stream;
            overlay.style.display = 'block';
            v.style.display = 'block'; 
            sh.style.display = 'block'; 
            exitBtn.style.display = 'block';
            aiLabel.style.display = targetCell ? 'none' : 'block';
            aiLabel.innerText = "COSA È?";
            aiHeader.style.display = 'none';
            ui.style.display = 'none'; 
            canvas.style.display = 'none';
        } catch (e) { alert("Errore fotocamera."); }
    }

    function chiudiCam() {
        if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        overlay.style.display = 'none';
        resetAR(); // Ritorna tutto normale alla chiusura
    }

    // --- LOGICA AR (MAPPATURA PUNTI) ---
    function toggleRecognition() {
        if (!isMapping) mostraPuntiScansione();
    }

    function mostraPuntiScansione() {
        resetAR();
        aiLabel.innerText = "ANALISI...";
        sh.style.display = 'none'; // Nascondi scatto durante analisi

        // Animazione Vortice
        const dots = [];
        for (let i = 0; i < 8; i++) {
            const d = document.createElement('div');
            d.className = 'scan-dot';
            overlay.appendChild(d);
            dots.push(d);
        }

        let start = Date.now();
        function vortex() {
            let elapsed = Date.now() - start;
            if (elapsed < 1000) {
                dots.forEach((d, i) => {
                    let angle = (elapsed / 150) + (i * Math.PI / 4);
                    let r = 100 * (1 - elapsed/1000);
                    d.style.left = (window.innerWidth/2 + Math.cos(angle)*r) + 'px';
                    d.style.top = (window.innerHeight/2 + Math.sin(angle)*r) + 'px';
                });
                requestAnimationFrame(vortex);
            } else {
                dots.forEach(d => d.remove());
                startMapping();
            }
        }
        vortex();
    }

    function startMapping() {
        isMapping = true;
        arReticle.style.display = 'block';
        btnConfirm.style.display = 'flex';
        aiLabel.innerText = "MAPPA I PUNTI (0)";
        arCanvas.width = window.innerWidth;
        arCanvas.height = window.innerHeight;
        renderLines();
    }

   function addARPoint() {
    // Coordinate esatte del centro mirino
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;
    
    const p = { x: centerX, y: centerY };
    arPoints.push(p);

    // Crea il punto visivo
    const dot = document.createElement('div');
    dot.className = 'scan-dot';
    dot.style.background = '#34c759'; // Verde quando confermato
    dot.style.left = (p.x - 3) + 'px'; // Centra il puntino da 6px
    dot.style.top = (p.y - 3) + 'px';
    overlay.appendChild(dot);

    // Feedback aptico (se supportato)
    if (navigator.vibrate) navigator.vibrate(10);

    aiLabel.innerText = `PUNTI RILEVATI: ${arPoints.length}`;
    if (arPoints.length >= 4) btnFinish.style.display = 'block';
}


function renderLines() {
    if (!isMapping) return;
    const ctx = arCanvas.getContext('2d');
    ctx.clearRect(0, 0, arCanvas.width, arCanvas.height);

    if (arPoints.length > 0) {
        ctx.beginPath();
        ctx.setLineDash([5, 5]); // Linea tratteggiata stile scansione
        ctx.strokeStyle = "#FFD60A";
        ctx.lineWidth = 2;

        // 1. Disegna le linee tra i punti già fissati
        ctx.moveTo(arPoints[0].x, arPoints[0].y);
        for(let i = 1; i < arPoints.length; i++) {
            ctx.lineTo(arPoints[i].x, arPoints[i].y);
        }
        
        // 2. LA LINEA ELASTICA: Collega l'ultimo punto fisso al mirino centrale
        // Questo crea l'effetto "filo" mentre muovi il telefono
        ctx.lineTo(window.innerWidth / 2, window.innerHeight / 2);
        
        ctx.stroke();

        // 3. Se hai almeno 3 punti, chiudi la forma virtualmente verso il primo punto
        // per mostrare l'area che stai scansionando
        if (arPoints.length >= 3) {
            ctx.beginPath();
            ctx.setLineDash([2, 4]);
            ctx.strokeStyle = "rgba(255, 214, 10, 0.4)";
            ctx.moveTo(window.innerWidth / 2, window.innerHeight / 2);
            ctx.lineTo(arPoints[0].x, arPoints[0].y);
            ctx.stroke();
        }
    }
    requestAnimationFrame(renderLines);
}

    function finishARMapping() {
        isMapping = false;
        arReticle.style.display = 'none';
        btnConfirm.style.display = 'none';
        btnFinish.style.display = 'none';
        sh.style.display = 'block';

        // Logica riconoscimento basata sul numero di punti
        tipoCorrente = (arPoints.length >= 10) ? "Maglia" : "Pantalone";
        
        aiHeader.style.display = 'block';
        aiHeader.innerText = tipoCorrente.toUpperCase() + " RILEVATO";
        aiHeader.style.color = "#FFD60A";
        riconoscimentoAvvenuto = true;
        
        aggiornaNomiGriglia();

        setTimeout(() => {
            resetAR();
            aiHeader.style.display = 'none';
        }, 3000);
    }

    function resetAR() {
        isMapping = false;
        arPoints = [];
        arReticle.style.display = 'none';
        btnConfirm.style.display = 'none';
        btnFinish.style.display = 'none';
        sh.style.display = 'block';
        document.querySelectorAll('.scan-dot').forEach(d => d.remove());
        const ctx = arCanvas.getContext('2d');
        ctx.clearRect(0, 0, arCanvas.width, arCanvas.height);
    }

    // --- FUNZIONI GRIGLIA ---
    function creaGriglia() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.setAttribute('data-label', etichettePantaloni[i]); 
            cell.onclick = () => { targetCell = cell; attivaCam(); };
            container.appendChild(cell);
        }
    }
    creaGriglia();

    function aggiornaNomiGriglia() {
        const cells = document.querySelectorAll('.grid-cell');
        let labels = (tipoCorrente === "Maglia") ? etichetteMaglie : etichettePantaloni;
        cells.forEach((cell, i) => {
            if (!cell.classList.contains('filled')) cell.setAttribute('data-label', labels[i]);
        });
    }

    // Inizializzazione galleria
    function aggiornaAnteprimaGalleria(sorgente) {
        document.getElementById('btn-gallery').innerHTML = `<img src="${sorgente}" style="width:100%; height:100%; object-fit:cover;">`;
    }
</script>

</body>
